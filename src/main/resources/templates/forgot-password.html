<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - HSF System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            overflow: hidden;
        }
        .fp-card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            background: #ffffff;
        }
        .fp-header {
            padding: 35px 40px 10px;
            text-align: center;
        }
        .fp-header i {
            font-size: 3.5rem;
            color: #764ba2;
        }
        .fp-header h3 {
            margin: 15px 0 5px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        .card-body {
            padding: 20px 50px 35px !important;
        }
        .form-control {
            border-radius: 12px;
            padding: 12px 18px;
            border: 1px solid #e0e0e0;
            background-color: #fdfdfd;
        }
        .form-control:focus {
            box-shadow: 0 0 0 0.25rem rgba(118, 75, 162, 0.15);
            border-color: #764ba2;
            background-color: #fff;
        }
        .btn-custom {
            background: linear-gradient(to right, #667eea, #764ba2);
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            color: white;
        }
        .btn-custom:hover {
            filter: brightness(1.1);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(118, 75, 162, 0.3);
            color: white;
        }
        .text-custom {
            color: #764ba2;
            font-weight: 700;
            text-decoration: none;
        }
        .text-custom:hover {
            color: #667eea;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-11 col-sm-10 col-md-8 col-lg-5 col-xl-4">

            <div class="card fp-card">
                <div class="fp-header">
                    <i class="bi bi-patch-question-fill"></i>
                    <h3>Forgot Password?</h3>
                    <p class="text-muted small">Nhập email để nhận liên kết đặt lại mật khẩu</p>
                </div>

                <div class="card-body">
                    <div th:if="${message}" class="alert alert-success d-flex align-items-center py-2 mb-4 border-0 shadow-sm" role="alert">
                        <i class="bi bi-check-circle-fill me-2"></i>
                        <span class="small" th:text="${message}"></span>
                    </div>

                    <div th:if="${error}" class="alert alert-danger d-flex align-items-center py-2 mb-4 border-0 shadow-sm" role="alert">
                        <i class="bi bi-exclamation-octagon-fill me-2"></i>
                        <span class="small" th:text="${error}"></span>
                    </div>

                    <form th:action="@{/forgot-password}" method="post">
                        <div class="mb-4 text-start">
                            <label class="form-label small fw-bold text-dark ms-1">Email Address / Username</label>
                            <div class="input-group">
                                <input type="text" name="email" class="form-control"
                                       placeholder="Nhập tài khoản của bạn" required autofocus>
                            </div>
                            <div class="form-text mt-2 ms-1">
                                <i class="bi bi-info-circle me-1"></i> Hệ thống sẽ gửi link qua email đã đăng ký.
                            </div>
                        </div>

                        <button type="submit" class="btn btn-custom w-100 mb-3">
                            GỬI YÊU CẦU <i class="bi bi-send-fill ms-2"></i>
                        </button>

                        <div class="text-center mt-3 pt-2 border-top">
                            <a href="/login" class="text-custom small">
                                <i class="bi bi-arrow-left me-1"></i> Quay lại trang Đăng nhập
                            </a>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
