<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security6">
<link rel="stylesheet" th:href="@{/style.css}">
<body>

<nav th:fragment="header(pageTitle)"
     class="navbar navbar-expand-lg bg-white shadow-sm py-2 border-bottom">

    <div class="container-fluid px-4">

        <!-- TITLE -->
        <h4 class="mb-0 fw-semibold header-title" th:text="${pageTitle}">
            Default
        </h4>

        <!-- PHẦN BÊN PHẢI GIỮ NGUYÊN -->

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            </ul>

            <div class="d-flex align-items-center gap-3">

                <!-- Cart (USER only) -->
                <div sec:authorize="hasRole('USER')">
                    <a href="/cart" class="btn btn-light position-relative p-2">
                        <i class="bi bi-cart3 fs-5"></i>
                    </a>
                </div>

                <div class="dropdown">
                    <button class="btn btn-light position-relative p-2" type="button" data-bs-toggle="dropdown">
                        <i class="bi bi-bell fs-5"></i>
                        <span th:if="${unreadCount > 0}"
                              class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                              th:text="${unreadCount}" style="font-size: 0.65rem;">0</span>
                    </button>

                    <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2" style="width: 300px; max-height: 400px; overflow-y: auto;">
                        <li class="dropdown-header border-bottom pb-2 mb-1">Notifications</li>

                        <li th:if="${#lists.isEmpty(notifications)}">
                            <span class="dropdown-item text-muted text-center py-3">No notifications</span>
                        </li>

                        <li th:each="noti : ${notifications}">
                            <a class="dropdown-item py-2 px-3 border-bottom-0"
                               th:href="@{/notifications/read/{id}(id=${noti.id})}"
                               th:classappend="${!noti.isRead} ? 'bg-light fw-bold' : ''">
                                <div class="d-flex align-items-start">
                                    <div class="flex-shrink-0 mt-1">
                                        <i class="bi bi-info-circle text-primary"></i>
                                    </div>
                                    <div class="flex-grow-1 ms-3">
                                        <div class="text-dark small text-wrap" th:text="${noti.title}">Title</div>
                                        <div class="text-muted" style="font-size: 0.75rem;" th:text="${noti.message}">Message content...</div>
                                    </div>
                                    <span th:if="${!noti.isRead}" class="ms-2 badge bg-primary rounded-circle p-1" style="width:6px; height:6px;"></span>
                                </div>
                            </a>
                        </li>

                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item text-center small text-primary fw-bold" th:href="@{/notifications}">View All</a></li>
                    </ul>
                </div>

                <div class="bg-secondary bg-opacity-25 px-3 py-1 rounded-pill d-none d-md-flex align-items-center border border-secondary border-opacity-25">
                    <i class="bi bi-wallet2 text-success me-2"></i>
                    <span class="text-white small fw-semibold">
    Balance:
    <span class="text-success"
          th:text="${#numbers.formatDecimal(balance, 0, 'COMMA', 0, 'POINT')} + ' đ'">
        0 đ
    </span>
</span>
                </div>

                <div class="dropdown">
                    <button class="btn btn-outline-black rounded-pill px-3 d-flex align-items-center gap-2" type="button" data-bs-toggle="dropdown">
                        <i class="bi bi-person-circle fs-5"></i>
                        <span class="small d-none d-sm-inline" sec:authentication="name">User</span>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2">
                        <li><a class="dropdown-item" href="/profile"><i class="bi bi-person me-2"></i>My Profile</a></li>
                        <li><a class="dropdown-item" href="/wallet"><i class="bi bi-credit-card me-2"></i>Deposit Money</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <form th:action="@{/logout}" method="post">
                                <button type="submit" class="dropdown-item text-danger d-flex align-items-center">
                                    <i class="bi bi-box-arrow-right me-2"></i> Sign Out
                                </button>
                            </form>
                        </li>
                    </ul>
                </div>

            </div>
        </div>
    </div>
</nav>

</body>
</html>
