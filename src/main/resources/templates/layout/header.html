<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security6">
<body>

<nav th:fragment="header" class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">HSF System</a>

        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/market">
                        <i class="bi bi-shop"></i> Market
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link text-warning" href="/admin/dashboard">
                        <i class="bi bi-people-fill"></i> Dashboard
                    </a>
                </li>

                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link text-warning" href="/admin/users">
                        <i class="bi bi-people-fill"></i> User Management
                    </a>
                </li>

                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link text-warning" href="/admin/categories">
                        <i class="bi bi-gear-fill"></i> Category Management
                    </a>
                </li>
            </ul>

            <div class="d-flex align-items-center">

                <!-- Notification -->
                <div class="dropdown me-3">
                    <button class="btn btn-outline-light position-relative dropdown-toggle"
                            type="button"
                            data-bs-toggle="dropdown">

                        <i class="bi bi-bell"></i>

                        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                              th:text="${unreadCount}">
        </span>

                    </button>

                    <ul class="dropdown-menu dropdown-menu-end shadow">

                        <li class="dropdown-header">Notifications</li>

                        <li th:each="noti : ${notifications}">
                            <a class="dropdown-item d-flex justify-content-between align-items-start"
                               th:href="@{/notifications/read/{id}(id=${noti.id})}"

                               th:classappend="${!noti.isRead} ? 'fw-bold'">

                                <div>

                                    <i class="bi bi-bell text-primary me-2"></i>

                                    <span th:text="${noti.title}"></span>

                                    <br>

                                    <small class="text-muted"
                                           th:text="${noti.message}">
                                    </small>

                                </div>

                                <!-- chấm xanh -->
                                <span th:if="${!noti.isRead}"
                                      style="width:8px;height:8px;background:#0d6efd;border-radius:50%;">
                                </span>

                            </a>
                        </li>

                        <li><hr class="dropdown-divider"></li>

                        <li>
                            <a class="dropdown-item text-center"
                               th:href="@{/notifications}">
                                View all notifications
                            </a>
                        </li>

                    </ul>
                </div>

                <!-- Balance -->
                <div class="text-white me-4">
                    <i class="bi bi-wallet2 text-success"></i>
                    <span class="fw-bold">Balance: $0.00</span>
                </div>

                <!-- User -->
                <div class="dropdown">
                    <button class="btn btn-outline-light dropdown-toggle"
                            type="button"
                            data-bs-toggle="dropdown">
                        <i class="bi bi-person-circle"></i>
                        <span sec:authentication="name">User</span>
                    </button>

                    <ul class="dropdown-menu dropdown-menu-end">
                        <li>
                            <a class="dropdown-item" href="/profile">
                                My Profile
                            </a>
                        </li>

                        <li><hr class="dropdown-divider"></li>

                        <li>
                            <form th:action="@{/logout}" method="post">
                                <button type="submit"
                                        class="dropdown-item text-danger">
                                    Sign Out
                                </button>
                            </form>
                        </li>
                    </ul>
                </div>

            </div>
        </div>
    </div>
</nav>

</body>
</html>
