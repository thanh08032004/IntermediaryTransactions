<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security6">
<head>
    <meta charset="UTF-8">
    <title>My Cart</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/style.css}">
</head>

<body class="bg-light">

<!-- HEADER -->
<div th:replace="~{layout/header :: header('My Cart')}"></div>

<!-- LAYOUT -->
<div class="layout">

    <!-- SIDEBAR -->
    <div th:replace="~{layout/sidebar :: sidebar}"></div>

    <!-- CONTENT -->
    <div class="content">
        <div class="container-fluid mt-4 px-4">

            <div class="card shadow">

                <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                    <h4 class="mb-0">My Cart</h4>
                    <a href="/" class="btn btn-secondary btn-sm">
                        <i class="bi bi-arrow-left-circle"></i> Continue Shopping
                    </a>
                </div>

                <div class="card-body">

                    <div th:if="${#lists.isEmpty(cartItems)}" class="alert alert-info text-center">
                        Your cart is empty
                    </div>

                    <div th:if="${!#lists.isEmpty(cartItems)}" class="table-responsive">

                        <table class="table table-hover align-middle">
                            <thead class="table-secondary">
                            <tr>
                                <th>Product</th>
                                <th>Price</th>
                                <th>Quantity</th>
                                <th>Subtotal</th>
                                <th>Action</th>
                            </tr>
                            </thead>

                            <tbody>
                            <tr th:each="item : ${cartItems}">
                                <td>
                                    <div class="d-flex align-items-center gap-2">
                                        <img th:src="${item.product.mainImageUrl}" alt="img"
                                             style="width:50px;height:50px;object-fit:cover;border-radius:5px;">
                                        <span th:text="${item.product.name}" class="fw-semibold"></span>
                                    </div>
                                </td>
                                <td th:text="${#numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                                <td>
                                    <form th:action="@{/cart/update}" method="post" class="d-flex gap-2">
                                        <input type="hidden" name="productId" th:value="${item.product.id}" />
                                        <input type="number" name="quantity" th:value="${item.quantity}" min="1"
                                               class="form-control w-25" style="margin-left: 150px;"/>
                                        <button class="btn btn-primary btn-sm">Update</button>
                                    </form>
                                </td>
                                <td th:text="${#numbers.formatDecimal(item.price.multiply(item.quantity), 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                                <td>
                                    <form th:action="@{/cart/remove}" method="post">
                                        <input type="hidden" name="productId" th:value="${item.product.id}" />
                                        <button class="btn btn-danger btn-sm">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </form>
                                </td>
                            </tr>
                            </tbody>
                        </table>

                        <div class="d-flex justify-content-end mt-3">
                            <h5>Total:
                                <span th:text="${#numbers.formatDecimal(total, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
                            </h5>
                        </div>

                        <div class="d-flex justify-content-end mt-2">
                            <a href="/checkout" class="btn btn-success btn-lg">
                                <i class="bi bi-bag-check"></i> Checkout
                            </a>
                        </div>

                    </div>

                </div>
            </div>

        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
