<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security6">
<head>
    <meta charset="UTF-8">
    <title>My Cart</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/style.css}">
</head>

<body class="bg-light">

<!-- HEADER -->
<div th:replace="~{layout/header :: header('My Cart')}"></div>

<!-- LAYOUT -->
<div class="layout">

    <!-- SIDEBAR -->
    <div th:replace="~{layout/sidebar :: sidebar}"></div>

    <!-- CONTENT -->
    <div class="content">
        <div class="container py-4">

            <div class="row g-4">

                <!-- LEFT: CART TABLE -->
                <div class="col-lg-8">

                    <div class="card shadow-sm border-0 rounded-3">

                        <div class="card-header bg-white border-bottom d-flex justify-content-between align-items-center">
                            <h5 class="mb-0 fw-bold">
                                <i class="bi bi-cart"></i> My Cart
                            </h5>
                            <a href="/" class="btn btn-outline-secondary btn-sm">
                                <i class="bi bi-arrow-left"></i> Continue Shopping
                            </a>
                        </div>

                        <div class="card-body">

                            <!-- EMPTY -->
                            <div th:if="${#lists.isEmpty(cartItems)}"
                                 class="text-center py-5">
                                <i class="bi bi-cart-x fs-1 text-muted"></i>
                                <p class="mt-3 text-muted">Your cart is empty</p>
                                <a href="/" class="btn btn-primary btn-sm">
                                    Shop now
                                </a>
                            </div>

                            <!-- HAS ITEMS -->
                            <div th:if="${!#lists.isEmpty(cartItems)}">

                                <div class="table-responsive">
                                    <table class="table align-middle">
                                        <thead class="table-light">
                                        <tr>
                                            <th>Product</th>
                                            <th class="text-center">Qty</th>
                                            <th class="text-end">Price</th>
                                            <th class="text-end">Subtotal</th>
                                            <th class="text-center">Action</th>
                                        </tr>
                                        </thead>

                                        <tbody>
                                        <tr th:each="item : ${cartItems}">
                                            <!-- PRODUCT -->
                                            <td>
                                                <div class="d-flex align-items-center gap-3">
                                                    <img th:src="${item.product.mainImageUrl}"
                                                         style="width:60px;height:60px;object-fit:cover;border-radius:8px;">
                                                    <div>
                                                        <div class="fw-semibold"
                                                             th:text="${item.product.name}"></div>
                                                    </div>
                                                </div>
                                            </td>

                                            <!-- QUANTITY -->
                                            <td class="text-center">
                                                <form th:action="@{/cart/update}" method="post"
                                                      class="d-flex justify-content-center gap-2">

                                                    <input type="hidden" name="productId"
                                                           th:value="${item.product.id}" />

                                                    <input type="number" name="quantity"
                                                           th:value="${item.quantity}" min="1"
                                                           class="form-control form-control-sm"
                                                           style="width:70px;" />

                                                    <button class="btn btn-outline-primary btn-sm">
                                                        <i class="bi bi-arrow-repeat"></i>
                                                    </button>
                                                </form>
                                            </td>

                                            <!-- PRICE -->
                                            <td class="text-end"
                                                th:text="${#numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>

                                            <!-- SUBTOTAL -->
                                            <td class="text-end fw-semibold text-success"
                                                th:text="${#numbers.formatDecimal(item.price.multiply(item.quantity), 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>

                                            <!-- DELETE -->
                                            <td class="text-center">
                                                <form th:action="@{/cart/remove}" method="post">
                                                    <input type="hidden" name="productId"
                                                           th:value="${item.product.id}" />

                                                    <button class="btn btn-outline-danger btn-sm">
                                                        <i class="bi bi-trash"></i>
                                                    </button>
                                                </form>
                                            </td>
                                        </tr>
                                        </tbody>
                                    </table>
                                </div>

                            </div>

                        </div>

                    </div>

                </div>

                <!-- RIGHT: SUMMARY -->
                <div class="col-lg-4">

                    <div class="card shadow-sm border-0 rounded-3">

                        <div class="card-body">

                            <h5 class="fw-bold mb-3">
                                <i class="bi bi-receipt"></i> Summary
                            </h5>

                            <div class="d-flex justify-content-between mb-2">
                                <span>Total</span>
                                <strong class="text-success"
                                        th:text="${#numbers.formatDecimal(total, 0, 'COMMA', 0, 'POINT')} + ' đ'">
                                </strong>
                            </div>

                            <hr>

                            <div class="d-grid">
                                <form th:action="@{/checkout/confirm}" method="post">
                                    <button class="btn btn-success btn-lg rounded-3">
                                        <i class="bi bi-bag-check"></i> Checkout
                                    </button>
                                </form>
                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
