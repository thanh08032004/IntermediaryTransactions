<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security6">
<head>
    <meta charset="UTF-8">
    <title>My Cart</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/style.css}">
    <style>
        .subtotal-cell {
            font-weight: 600;
            color: #198754;
        }
    </style>
</head>

<body class="bg-light">

<!-- HEADER -->
<div th:replace="~{layout/header :: header('My Cart')}"></div>

<!-- LAYOUT -->
<div class="layout">

    <!-- SIDEBAR -->
    <div th:replace="~{layout/sidebar :: sidebar}"></div>

    <!-- CONTENT -->
    <div class="content">
        <div class="container py-4">

            <div class="row g-4">

                <!-- LEFT: CART TABLE -->
                <div class="col-lg-8">

                    <div class="card shadow-sm border-0 rounded-3">

                        <div class="card-header bg-white border-bottom d-flex justify-content-between align-items-center">
                            <h5 class="mb-0 fw-bold">
                                <i class="bi bi-cart"></i> My Cart
                            </h5>
                            <a href="/" class="btn btn-outline-secondary btn-sm">
                                <i class="bi bi-arrow-left"></i> Continue Shopping
                            </a>
                        </div>

                        <div class="card-body">

                            <!-- EMPTY -->
                            <div th:if="${#lists.isEmpty(cartItems)}"
                                 class="text-center py-5">
                                <i class="bi bi-cart-x fs-1 text-muted"></i>
                                <p class="mt-3 text-muted">Your cart is empty</p>
                                <a href="/" class="btn btn-primary btn-sm">
                                    Shop now
                                </a>
                            </div>

                            <!-- HAS ITEMS -->
                            <div th:if="${!#lists.isEmpty(cartItems)}">

                                <div class="table-responsive">
                                    <table class="table align-middle">
                                        <thead class="table-light">
                                        <tr>
                                            <th>Product</th>
                                            <th class="text-center">Qty</th>
                                            <th class="text-end">Price</th>
                                            <th class="text-end">Subtotal</th>
                                            <th class="text-center">Action</th>
                                        </tr>
                                        </thead>

                                        <tbody>
                                        <tr th:each="item : ${cartItems}">
                                            <!-- PRODUCT -->
                                            <td>
                                                <div class="d-flex align-items-center gap-3">
                                                    <img th:src="${item.product.mainImageUrl}"
                                                         style="width:60px;height:60px;object-fit:cover;border-radius:8px;">
                                                    <div>
                                                        <div class="fw-semibold"
                                                             th:text="${item.product.name}"></div>
                                                    </div>
                                                </div>
                                            </td>

                                            <!-- QUANTITY -->
                                            <td class="text-center">
                                                <input type="number"
                                                       th:value="${item.quantity}"
                                                       min="1"
                                                       class="form-control form-control-sm quantity-input"
                                                       style="width:70px;" />
                                            </td>

                                            <!-- PRICE -->
                                            <td class="text-end price-cell"
                                                th:text="${#numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>

                                            <!-- SUBTOTAL -->
                                            <td class="text-end fw-semibold text-success subtotal-cell"
                                                th:text="${#numbers.formatDecimal(item.price.multiply(item.quantity), 0, 'COMMA', 0, 'POINT')} + ' đ'">
                                            </td>

                                            <!-- DELETE -->
                                            <td class="text-center">
                                                <form th:action="@{/cart/remove}" method="post">
                                                    <input type="hidden" name="productId"
                                                           th:value="${item.product.id}" />
                                                    <button class="btn btn-outline-danger btn-sm">
                                                        <i class="bi bi-trash"></i>
                                                    </button>
                                                </form>
                                            </td>
                                        </tr>
                                        </tbody>
                                    </table>
                                </div>

                            </div>

                        </div>

                    </div>

                </div>

                <!-- RIGHT: SUMMARY -->
                <div class="col-lg-4">

                    <div class="card shadow-sm border-0 rounded-3">

                        <div class="card-body">

                            <h5 class="fw-bold mb-3">
                                <i class="bi bi-receipt"></i> Summary
                            </h5>

                            <div class="d-flex justify-content-between mb-2">
                                <span>Total</span>
                                <strong class="text-success total-value"
                                        th:text="${#numbers.formatDecimal(total, 0, 'COMMA', 0, 'POINT')} + ' đ'">
                                </strong>
                            </div>

                            <hr>

                            <div class="d-grid">
                                <form th:action="@{/checkout/confirm}" method="post" id="checkout-form">
                                    <table class="table">
                                        <tbody>
                                        <tr th:each="item, iterStat : ${cartItems}">
                                            <td th:text="${item.product.name}"></td>
                                            <td>
                                                <input type="number" name="quantities" th:value="${item.quantity}" min="1"
                                                       class="form-control form-control-sm checkout-quantity"/>
                                                <input type="hidden" name="productIds" th:value="${item.product.id}"/>
                                            </td>
                                            <td th:text="${#numbers.formatDecimal(item.price,0,'COMMA',0,'POINT')} + ' đ'"></td>
                                        </tr>
                                        </tbody>
                                    </table>

                                    <button class="btn btn-success btn-lg" type="submit">Checkout</button>
                                </form>
                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const quantityInputs = document.querySelectorAll('.quantity-input');

        quantityInputs.forEach(input => {
            input.addEventListener('input', function() {
                const row = input.closest('tr');
                const priceCell = row.querySelector('.price-cell');
                const subtotalCell = row.querySelector('.subtotal-cell');

                const price = parseFloat(priceCell.textContent.replace(/\D/g,''));
                const qty = parseInt(input.value) || 0;

                subtotalCell.textContent = (price * qty).toLocaleString('vi-VN') + ' đ';

                // Cập nhật tổng tạm thời
                let total = 0;
                document.querySelectorAll('.subtotal-cell').forEach(cell => {
                    total += parseFloat(cell.textContent.replace(/\D/g,''));
                });
                document.querySelector('.total-value').textContent = total.toLocaleString('vi-VN') + ' đ';
            });
        });
    });
</script>
<script>
    document.getElementById('checkout-form').addEventListener('submit', function(e) {
        // Lấy tất cả input quantity ở bảng cart bên trái
        const cartInputs = document.querySelectorAll('.table.align-middle .quantity-input');

        // Lấy tất cả input quantity trong form checkout
        const checkoutInputs = document.querySelectorAll('.checkout-quantity');

        cartInputs.forEach((input, idx) => {
            checkoutInputs[idx].value = input.value; // copy value
        });
    });
</script>
</body>
</html>
