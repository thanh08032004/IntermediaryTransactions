<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security6">

<head>
    <meta charset="UTF-8">
    <title>Product Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/style.css}">
</head>

<body class="bg-light">

<!-- HEADER -->
<div th:replace="~{layout/header :: header('Product Management')}"></div>

<!-- LAYOUT -->
<div class="layout">

    <!-- SIDEBAR -->
    <div th:replace="~{layout/sidebar :: sidebar}"></div>

    <!-- CONTENT -->
    <div class="content">
        <div class="container-fluid mt-4 px-4">

            <div class="card shadow">

                <!-- HEADER -->
                <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                    <h4 class="mb-0">Product Management</h4>

                    <a href="/admin/products/add"
                       class="btn btn-success btn-sm"
                       sec:authorize="hasAuthority('MANAGE_PRODUCTS')">
                        <i class="bi bi-plus-circle"></i> Add Product
                    </a>
                </div>

                <!-- BODY -->
                <div class="card-body">

                    <!-- ALERT -->
                    <div th:if="${param.success == 'added'}" class="alert alert-success">
                        Product added successfully
                    </div>

                    <div th:if="${param.success == 'updated'}" class="alert alert-info">
                        Product updated successfully
                    </div>

                    <div th:if="${param.success == 'deleted'}" class="alert alert-warning">
                        Product deleted
                    </div>

                    <!-- SEARCH -->
                    <form method="get" th:action="@{/admin/products}" class="row mb-3">
                        <div class="col-md-4">
                            <input type="text"
                                   name="keyword"
                                   th:value="${keyword}"
                                   class="form-control"
                                   placeholder="Search product name...">
                        </div>

                        <div class="col-md-2">
                            <button class="btn btn-primary">
                                <i class="bi bi-search"></i> Search
                            </button>
                        </div>
                    </form>

                    <!-- TABLE -->
                    <div class="table-responsive">

                        <table class="table table-hover align-middle">
                            <thead class="table-secondary">
                            <tr>
                                <th>Invoice ID</th>
                                <th>Code</th>
                                <th>Subject</th>
                                <th>Price</th>
                                <th>Fee Payer</th>
                                <th>Fee Amount</th>
                                <th>Buyer Total</th>
                                <th>Status</th>
                                <th>Contact</th>
                                <th>Share Link</th>
                            </tr>
                            </thead>

                            <tbody>
                            <tr th:each="inv : ${invoices}">
                                <td th:text="${inv.invoiceId}"></td>
                                <td th:text="${inv.invoiceCode}"></td>
                                <td th:text="${inv.subject}"></td>
                                <td th:text="${#numbers.formatDecimal(inv.price,0,'COMMA',0,'POINT')} + ' $'"></td>
                                <td th:text="${inv.feePayer}"></td>
                                <td th:text="${#numbers.formatDecimal(inv.feeAmount,0,'COMMA',0,'POINT')} + ' $'"></td>
                                <td th:text="${#numbers.formatDecimal(inv.buyerTotal,0,'COMMA',0,'POINT')} + ' $'"></td>
                                <td>
            <span th:class="${inv.status == 'SUCCESS'} ? 'badge bg-success' :
                            (inv.status == 'PENDING') ? 'badge bg-warning' :
                            (inv.status == 'CHECKING') ? 'badge bg-info' :
                            (inv.status == 'COMPLAINT') ? 'badge bg-danger' :
                            'badge bg-secondary'"
                  th:text="${inv.status}">
            </span>
                                </td>
                                <td th:text="${inv.contactMethod}"></td>
                                <td>
                                    <a th:href="${inv.shareLink}" target="_blank">View</a>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>

                    <!-- PAGINATION -->
                    <nav>
                        <ul class="pagination justify-content-center">

                            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                                <a class="page-link"
                                   th:href="@{/admin/products(page=${currentPage - 1},keyword=${keyword})}">
                                    Previous
                                </a>
                            </li>

                            <li class="page-item"
                                th:each="i : ${#numbers.sequence(0,totalPages - 1)}"
                                th:classappend="${i == currentPage} ? 'active'">
                                <a class="page-link"
                                   th:text="${i+1}"
                                   th:href="@{/admin/products(page=${i},size=${size},keyword=${keyword})}">
                                </a>
                            </li>

                            <li class="page-item" th:classappend="${currentPage+1 == totalPages} ? 'disabled'">
                                <a class="page-link"
                                   th:href="@{/admin/products(page=${currentPage+1},keyword=${keyword})}">
                                    Next
                                </a>
                            </li>

                        </ul>
                    </nav>

                </div>
            </div>

        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
