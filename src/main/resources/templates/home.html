<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security6">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Intermediary Transactions</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/style.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<!-- HEADER -->
<div th:replace="~{layout/header :: header('Home Page')}"></div>

<!-- LAYOUT -->
<div class="layout">

    <!-- SIDEBAR -->
    <div th:replace="~{layout/sidebar :: sidebar}"></div>

    <!-- CONTENT -->
    <div class="content">
        <div class="container-fluid mt-4 px-4">
            <div class="row">

                <div class="col-12 mb-4">
                    <div class="p-5 bg-white rounded shadow-sm">
                        <h2>Welcome back, <span sec:authentication="name">Trader</span>!</h2>
                        <p class="text-muted">
                            Manage your intermediary transactions and track your account activity here.
                        </p>
                    </div>
                </div>

                <div class="col-md-12 mb-4" sec:authorize="hasRole('ADMIN')">
                    <div class="card border-0 shadow-sm bg-primary text-white">
                        <div class="card-body d-flex justify-content-between align-items-center">
                            <div>
                                <h5 class="card-title mb-1">Administrator Dashboard</h5>
                                <p class="mb-0">You have access to system management tools.</p>
                            </div>
                            <a href="/admin/users" class="btn btn-light text-primary fw-bold">
                                Manage Users
                            </a>
                        </div>
                    </div>
                </div>

                <div class="col-md-8">
                    <div class="card shadow-sm mb-4">
                        <div class="card-header bg-white fw-bold">Recent Invoices</div>
                        <div class="card-body text-center py-5">
                            <i class="bi bi-receipt text-secondary" style="font-size: 3rem;"></i>
                            <p class="mt-3">No active invoices found.</p>
                            <button class="btn btn-primary">Create New Invoice</button>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card shadow-sm">
                        <div class="card-header bg-white fw-bold">Quick Links</div>
                        <div class="list-group list-group-flush">
                            <a href="#" class="list-group-item list-group-item-action">Deposit Money</a>
                            <a href="#" class="list-group-item list-group-item-action">Withdraw Money</a>
                            <a href="#" class="list-group-item list-group-item-action">Transaction History</a>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

</div>

</body>
</html>
