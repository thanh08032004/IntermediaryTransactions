<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Accounts for Your Order</title>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icon -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/style.css}">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f5f5f5;
        }

        .content h1 {
            margin-bottom: 1.5rem;
            font-weight: 700;
            color: #333;
        }

        .account-table {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            width: 100%;
            overflow: hidden;
        }

        .account-table th, .account-table td {
            padding: 12px 15px;
            text-align: left;
        }

        .account-table thead {
            background-color: #007bff;
            color: #fff;
            font-weight: 600;
        }

        .account-table tbody tr:nth-child(odd) {
            background-color: #f9f9f9;
        }

        .account-table tbody tr:hover {
            background-color: #e9f5ff;
        }

        .back-link {
            margin-top: 20px;
            display: inline-block;
            text-decoration: none;
        }

        .back-link i {
            margin-right: 5px;
        }

    </style>
</head>
<body class="bg-light">

<div th:replace="~{layout/header :: header('Order Detail')}"></div>

<div class="layout">
    <div th:replace="~{layout/sidebar :: sidebar}"></div>

    <div class="content container mt-4">
        <h1>Accounts for Your Order</h1>

        <table class="account-table table">
            <thead>
            <tr>
                <th>No.</th>
                <th>Account</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="account, iterStat : ${accounts}">
                <td th:text="${iterStat.index + 1}"></td>
                <td th:text="${account}"></td>
            </tr>
            </tbody>
        </table>

        <p class="mt-3">Thank you for your purchase!</p>

        <a href="/products" class="btn btn-outline-primary back-link">
            <i class="bi bi-arrow-left-circle"></i> Back to Products
        </a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
