<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security6">
<head>
    <meta charset="UTF-8">
    <title>Edit Role Permissions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">
<div th:replace="~{layout/header :: header}"></div>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-10">
            <div class="card shadow border-0" sec:authorize="hasAuthority('MANAGE_ROLES')">
                <form th:action="@{/admin/roles/update}" method="post">
                    <input type="hidden" name="roleId" th:value="${role.id}">

                    <div class="card-header bg-primary text-white p-3">
                        <h4 class="mb-0">
                            <i class="bi bi-pencil-square me-2"></i>
                            Manage Permissions for: <span class="fw-bold" th:text="${role.name}">ROLE</span>
                        </h4>
                    </div>

                    <div class="card-body p-4">
                        <p class="text-muted border-bottom pb-2">Select the specific actions this role is allowed to perform.</p>

                        <div class="row mt-3">
                            <div th:each="perm : ${allPermissions}" class="col-md-6 mb-4">
                                <div class="card h-100 border-light shadow-sm">
                                    <div class="card-body d-flex align-items-center">
                                        <div class="form-check form-switch flex-grow-1">
                                            <input class="form-check-input shadow-none" type="checkbox"
                                                   name="permissionIds"
                                                   th:value="${perm.id}"
                                                   th:id="${'perm' + perm.id}"
                                                   th:checked="${role.permissions.contains(perm)}"
                                                   style="width: 2.5rem; height: 1.25rem; cursor: pointer;">
                                            <label class="form-check-label ms-3" th:for="${'perm' + perm.id}" style="cursor: pointer;">
                                                <div class="fw-bold text-dark" th:text="${perm.name}">PERMISSION_NAME</div>
                                                <small class="text-muted" th:text="${perm.description}">Description here...</small>
                                            </label>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="card-footer bg-white p-3 d-flex justify-content-end gap-2">
                        <a href="/admin/roles" class="btn btn-outline-secondary px-4">Cancel</a>
                        <button type="submit" class="btn btn-primary px-5">
                            <i class="bi bi-save2 me-2"></i> Save Permissions
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
