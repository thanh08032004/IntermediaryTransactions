<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Category Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>

<body class="bg-light">

<div th:replace="layout/header :: header"></div>

<div class="container mt-4">
    <div class="card shadow">

        <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
            <h4 class="mb-0">Category Management</h4>

            <a href="/admin/categories/add"
               class="btn btn-success btn-sm">
                <i class="bi bi-plus-circle"></i> Add Category
            </a>
        </div>

        <div class="card-body">

            <div th:if="${param.success == 'added'}"
                 class="alert alert-success">
                Category added successfully
            </div>

            <div th:if="${param.success == 'updated'}"
                 class="alert alert-info">
                Category updated successfully
            </div>

            <div th:if="${param.success == 'deleted'}"
                 class="alert alert-warning">
                Category deleted
            </div>

            <div class="table-responsive">

                <form method="get" th:action="@{/admin/categories}" class="row mb-3">

                    <div class="col-md-4">
                        <input type="text"
                               name="keyword"
                               th:value="${keyword}"
                               class="form-control"
                               placeholder="Search category name...">
                    </div>

                    <div class="col-md-2">
                        <button class="btn btn-primary">
                            <i class="bi bi-search"></i> Search
                        </button>
                    </div>

                </form>

                <table class="table table-hover align-middle">

                    <thead class="table-secondary">
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Description</th>
                        <th class="text-center">Actions</th>
                    </tr>
                    </thead>

                    <tbody>

                    <tr th:each="category : ${categories}">

                        <td th:text="${category.id}"></td>

                        <td class="fw-bold"
                            th:text="${category.name}"></td>

                        <td th:text="${category.description}"></td>

                        <td class="text-center">

                            <div class="btn-group">

                                <a th:href="@{'/admin/categories/edit/' + ${category.id}}"
                                   class="btn btn-sm btn-outline-primary">

                                    <i class="bi bi-pencil"></i>
                                    Edit
                                </a>

                                <a th:href="@{'/admin/categories/delete/' + ${category.id}}"
                                   class="btn btn-sm btn-outline-danger"
                                   onclick="return confirm('Delete this category?')">

                                    <i class="bi bi-trash"></i>
                                </a>

                            </div>

                        </td>

                    </tr>

                    </tbody>

                </table>

                <nav>
                    <ul class="pagination justify-content-center">

                        <li class="page-item"
                            th:classappend="${currentPage == 0} ? 'disabled'">

                            <a class="page-link"
                               th:href="@{/admin/categories(page=${currentPage-1},keyword=${keyword})}">
                                Previous
                            </a>

                        </li>

                        <li class="page-item"
                            th:each="i : ${#numbers.sequence(0,totalPages-1)}"
                            th:classappend="${i == currentPage} ? 'active'">

                            <a class="page-link"
                               th:text="${i+1}"
                               th:href="@{/admin/categories(page=${i},keyword=${keyword})}">
                            </a>

                        </li>

                        <li class="page-item"
                            th:classappend="${currentPage+1 == totalPages} ? 'disabled'">

                            <a class="page-link"
                               th:href="@{/admin/categories(page=${currentPage+1},keyword=${keyword})}">
                                Next
                            </a>

                        </li>

                    </ul>
                </nav>

            </div>

        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
