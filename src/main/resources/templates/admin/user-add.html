<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security6">
<head>
    <title>Add New User - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-success text-white">
            <h4>Create New User Account</h4>
        </div>
        <div class="card-body" sec:authorize="hasAuthority('MANAGE_USERS')">
            <!-- Error message từ Service (runtime exception) -->
            <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show">
                <i class="bi bi-x-octagon-fill me-2"></i>
                <span th:text="${errorMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <form th:action="@{/admin/users/save}" th:object="${user}" method="post">
                <div class="row">
                    <div class="col-md-6 border-end">
                        <h5>Account Credentials</h5>
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" th:field="*{username}" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password"
                                   th:field="*{rawPassword}"
                                   th:classappend="${#fields.hasErrors('rawPassword')} ? 'is-invalid'"
                                   class="form-control">
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('rawPassword')}"
                                 th:errors="*{rawPassword}"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Role</label>
                            <select th:field="*{role.id}" class="form-select">
                                <option th:each="r : ${roles}" th:value="${r.id}" th:text="${r.name}"></option>
                            </select>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <h5>Personal Profile</h5>
                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" th:field="*{profile.fullname}" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" th:field="*{profile.email}" class="form-control">
                        </div>
                    </div>
                </div>
                <div class="mt-4 border-top pt-3">
                    <button type="submit" class="btn btn-primary">Create User</button>
                    <a href="/admin/users" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
