<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security6">

<head>
    <meta charset="UTF-8">
    <title>Edit Product - Admin</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>

<body class="bg-light">
<div th:replace="~{layout/header :: header('Chỉnh sửa sản phẩm')}"></div>
<div class="container mt-5">
    <div class="card shadow-lg border-0">

        <!-- HEADER -->
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
            <h4 class="mb-0">
                <i class="bi bi-box-seam"></i> Edit Product
            </h4>
            <span class="badge bg-light text-primary" th:text="'ID: ' + ${product.id}"></span>
        </div>

        <!-- BODY -->
        <a th:href="@{/admin/products(keyword=${keyword}, page=${page})}"
           class="btn btn-secondary">
            ⬅ Back to List
        </a>
        <div class="card-body p-4" sec:authorize="hasAuthority('MANAGE_PRODUCTS')">
            <form th:action="@{/admin/products/update}"
                  th:object="${product}"
                  enctype="multipart/form-data"
                  method="post">
                <input type="hidden" th:field="*{id}">

                <!-- NAME -->
                <div class="mb-3">
                    <label>Name</label>
                    <input type="text" th:field="*{name}" class="form-control" required>
                </div>

                <!-- CATEGORY -->
                <div class="mb-3">
                    <label>Category</label>
                    <select th:field="*{category.id}" class="form-select">
                        <option th:each="c : ${categories}"
                                th:value="${c.id}"
                                th:text="${c.name}">
                        </option>
                    </select>
                </div>

                <!-- DESCRIPTION -->
                <div class="mb-3">
                    <label>Description</label>
                    <textarea th:field="*{description}" class="form-control"></textarea>
                </div>

                <!-- STATUS -->
                <div class="mb-3">
                    <label>Status</label>
                    <select th:field="*{status}" class="form-select">
                        <option value="">-- Select Status --</option>
                        <option value="ACTIVE">ACTIVE</option>
                        <option value="INACTIVE">INACTIVE</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label>Upload Images</label>
                    <input type="file" name="images" multiple required class="form-control">
                </div>

                <div class="mb-3">
                    <label>Main Image (index)</label>
                    <input type="number" name="mainIndex" class="form-control" placeholder="0 = ảnh đầu">
                </div>
                <div class="mb-3">
                    <label>Current Images</label>
                    <div class="d-flex gap-2">
                        <img th:each="img : ${product.images}"
                             th:src="${img.imageUrl}"
                             width="80"
                             class="rounded border">
                    </div>
                </div>
                


                <!-- KHÔNG CHO EDIT -->
                <!--
                price
                quantity
                supplier_id
                -->

                <button type="submit" class="btn btn-success">
                    Save
                </button>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
