<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security6">
<head>
    <meta charset="UTF-8">
    <title>Role Management - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">
<div th:replace="~{layout/header :: header('Quản lý Roles')}"></div>

<div class="container mt-4">
    <div class="card shadow border-0">
        <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
            <h4 class="mb-0"><i class="bi bi-shield-shaded me-2"></i>Role & Permission Management</h4>
        </div>
        <div class="card-body">
            <div th:if="${param.success}" class="alert alert-success">Permissions updated successfully!</div>

            <table class="table table-hover align-middle">
                <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>Role Name</th>
                    <th>Description</th>
                    <th>Current Permissions</th>
                    <th class="text-center" sec:authorize="hasAuthority('MANAGE_ROLES')">Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="role : ${roles}">
                    <td th:text="${role.id}">1</td>
                    <td><span class="badge bg-primary px-3" th:text="${role.name}">ADMIN</span></td>
                    <td th:text="${role.description}">Description...</td>
                    <td>
                                <span th:each="p : ${role.permissions}"
                                      class="badge bg-secondary me-1"
                                      th:text="${p.name}">PERMISSION</span>
                    </td>
                    <td class="text-center">
                        <a th:href="@{/admin/roles/edit/{id}(id=${role.id})}" class="btn btn-warning btn-sm">
                            <i class="bi bi-key-fill"></i> Edit Permissions
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
