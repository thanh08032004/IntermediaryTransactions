<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security6">
<head>
    <meta charset="UTF-8">
    <title>User Management - Admin</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/style.css}">
</head>

<body class="bg-light">

<!-- HEADER -->
<div th:replace="~{layout/header :: header('Quản lý Users')}"></div>

<!-- LAYOUT -->
<div class="layout">

    <!-- SIDEBAR -->
    <div th:replace="~{layout/sidebar :: sidebar}"></div>

    <!-- CONTENT -->
    <div class="content">
        <div class="container-fluid mt-4 px-4">

            <div class="card shadow">

                <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                    <h4 class="mb-0">User Management System</h4>

                    <div sec:authorize="hasAuthority('MANAGE_USERS')">
                        <a href="/admin/users/add" class="btn btn-success btn-sm me-2">
                            <i class="bi bi-plus-circle"></i> Add New User
                        </a>
                    </div>
                </div>

                <div class="card-body">

                    <!-- ALERTS -->
                    <div th:if="${param.success == 'updated'}"
                         class="alert alert-success alert-dismissible fade show">
                        <i class="bi bi-check-circle-fill me-2"></i>
                        User updated successfully!
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>

                    <div th:if="${param.success == 'deleted'}"
                         class="alert alert-warning alert-dismissible fade show">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i>
                        User deleted!
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>

                    <div th:if="${param.success == 'status_changed'}"
                         class="alert alert-info alert-dismissible fade show">
                        <i class="bi bi-info-circle-fill me-2"></i>
                        Status updated!
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>

                    <div th:if="${errorMessage}"
                         class="alert alert-danger alert-dismissible fade show">
                        <i class="bi bi-x-octagon-fill me-2"></i>
                        <span th:text="${errorMessage}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>

                    <!-- TABLE -->
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">

                            <thead class="table-secondary">
                            <tr>
                                <th>ID</th>
                                <th>Username</th>
                                <th>Full Name</th>
                                <th>Role</th>
                                <th>Status</th>
                                <th class="text-center"
                                    sec:authorize="hasAuthority('MANAGE_USERS')">
                                    Actions
                                </th>
                            </tr>
                            </thead>

                            <tbody>

                            <tr th:each="user : ${users}">

                                <td th:text="${user.id}"></td>

                                <td>
                                    <span th:text="${user.username}" class="fw-bold"></span>
                                    <span th:if="${user.username == #authentication.name}"
                                          class="badge bg-secondary ms-1">
                                        You
                                    </span>
                                </td>

                                <td th:text="${user.profile != null ? user.profile.fullname : 'N/A'}"></td>

                                <td>
                                    <span class="badge bg-info text-dark"
                                          th:text="${user.role.name}"></span>
                                </td>

                                <td>
                                    <span th:class="${user.active ? 'badge bg-success' : 'badge bg-danger'}"
                                          th:text="${user.active ? 'Active' : 'Locked'}"></span>
                                </td>

                                <td class="text-center">

                                    <div class="btn-group">

                                        <a th:href="@{'/admin/users/edit/' + ${user.id}}"
                                           class="btn btn-sm btn-outline-primary">
                                            <i class="bi bi-pencil"></i>
                                        </a>

                                        <form th:if="${user.username != #authentication.name}"
                                              th:action="@{'/admin/users/toggle/' + ${user.id}}"
                                              method="post" style="display:inline;">
                                            <button type="submit"
                                                    th:class="${user.active ?
                                                    'btn btn-sm btn-outline-warning' :
                                                    'btn btn-sm btn-outline-success'}">
                                                <i th:class="${user.active ?
                                                   'bi bi-lock' : 'bi bi-unlock'}"></i>
                                            </button>
                                        </form>

                                        <button th:if="${user.username == #authentication.name}"
                                                class="btn btn-sm btn-outline-secondary disabled">
                                            <i class="bi bi-person-fill-lock"></i>
                                        </button>

                                        <a th:if="${user.username != #authentication.name}"
                                           th:href="@{'/admin/users/delete/' + ${user.id}}"
                                           class="btn btn-sm btn-outline-danger"
                                           onclick="return confirm('Delete this user?')">
                                            <i class="bi bi-trash"></i>
                                        </a>

                                    </div>

                                </td>

                            </tr>

                            </tbody>

                        </table>
                    </div>

                </div>

            </div>

        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
