<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security6">
<head>
    <title>Add New Category - Admin</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>

<body class="bg-light">

<div th:replace="~{layout/header :: header('Thêm danh mục')}"></div>

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-success text-white">
            <h4>
                <i class="bi bi-tags"></i>
                Create New Category
            </h4>
        </div>

        <div class="card-body" sec:authorize="hasAuthority('MANAGE_CATEGORIES')">

            <form th:action="@{/admin/categories/save}"
                  th:object="${category}"
                  method="post">

                <div class="row">

                    <div class="col-md-6 border-end">

                        <h5>Category Information</h5>

                        <div class="mb-3">
                            <label class="form-label">Category Name</label>

                            <input type="text"
                                   th:field="*{name}"
                                   class="form-control"
                                   placeholder="Enter category name"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Description</label>

                            <textarea th:field="*{description}"
                                      class="form-control"
                                      rows="4"
                                      placeholder="Enter category description"></textarea>
                        </div>

                    </div>

                    <div class="col-md-6">

                        <h5>Information</h5>

                        <div class="alert alert-info">
                            Categories help organize products into groups.
                        </div>

                        <div class="alert alert-warning">
                            Example: Game Accounts, Steam Accounts, Mobile Games.
                        </div>

                    </div>

                </div>

                <div class="mt-4 border-top pt-3">

                    <button type="submit"
                            class="btn btn-primary">

                        <i class="bi bi-check-lg"></i>
                        Create Category
                    </button>

                    <a href="/admin/categories"
                       class="btn btn-secondary">

                        Cancel
                    </a>

                </div>

            </form>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
