<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Category - Admin</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>

<body class="bg-light">

<div th:replace="layout/header :: header"></div>

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
            <h4 class="mb-0">
                <i class="bi bi-tags"></i> Edit Category
            </h4>

            <span class="badge bg-light text-primary"
                  th:text="${'ID: ' + category.id}">
            </span>
        </div>

        <div class="card-body">

            <form th:action="@{/admin/categories/update}"
                  th:object="${category}"
                  method="post">

                <input type="hidden" th:field="*{id}">

                <div class="row">

                    <div class="col-md-6">

                        <h5 class="text-secondary mb-3">
                            <i class="bi bi-tag"></i> Category Information
                        </h5>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Category Name</label>

                            <input type="text"
                                   th:field="*{name}"
                                   class="form-control"
                                   placeholder="Enter category name"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Description</label>

                            <textarea th:field="*{description}"
                                      class="form-control"
                                      rows="4"
                                      placeholder="Category description"></textarea>
                        </div>

                    </div>

                    <div class="col-md-6">

                        <h5 class="text-secondary mb-3">
                            <i class="bi bi-info-circle"></i> Information
                        </h5>

                        <div class="alert alert-info">
                            <i class="bi bi-lightbulb"></i>
                            Categories help organize products in the system.
                        </div>

                        <div class="alert alert-warning">
                            <i class="bi bi-exclamation-triangle"></i>
                            Editing category name may affect product grouping.
                        </div>

                    </div>

                </div>

                <div class="mt-4 border-top pt-3 d-flex justify-content-end gap-2">

                    <a href="/admin/categories"
                       class="btn btn-secondary px-4">

                        <i class="bi bi-x-circle"></i>
                        Cancel
                    </a>

                    <button type="submit"
                            class="btn btn-success px-4">

                        <i class="bi bi-check-lg"></i>
                        Save Changes
                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
