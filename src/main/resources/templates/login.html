<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - HSF System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            overflow: hidden;
        }
        .login-card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
            background: #ffffff;
        }
        .login-header {
            padding: 25px 20px 10px;
            text-align: center;
        }
        .login-header i {
            font-size: 2.5rem;
            color: #764ba2;
        }
        .login-header h4 {
            margin: 10px 0 2px;
            font-weight: 700;
        }
        .form-control {
            border-radius: 8px;
            padding: 10px 12px;
            border: 1px solid #dee2e6;
        }
        .form-control:focus {
            box-shadow: 0 0 0 0.2rem rgba(118, 75, 162, 0.15);
            border-color: #764ba2;
        }
        .input-group-text {
            background-color: #f8f9fa;
            border-right: none;
            border-radius: 8px 0 0 8px;
            color: #764ba2;
            width: 40px;
            justify-content: center;
        }
        .form-control-with-icon {
            border-left: none;
            border-radius: 0 8px 8px 0;
        }
        .btn-login {
            background: linear-gradient(to right, #667eea, #764ba2);
            border: none;
            border-radius: 8px;
            padding: 10px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-login:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }
        .text-custom {
            color: #764ba2;
            font-weight: 600;
            text-decoration: none;
        }

    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-11 col-sm-8 col-md-6 col-lg-4 col-xl-3">

            <div class="login-card card">
                <div class="login-header">
                    <i class="bi bi-shield-lock-fill"></i>
                    <h4>Welcome Back</h4>
                    <p class="text-muted small">Enter your details to sign in</p>
                </div>

                <div class="card-body px-4 pb-3">
                    <div th:if="${param.error}" class="alert alert-danger p-2 small mb-3 border-0" role="alert">
                        <i class="bi bi-exclamation-circle-fill me-1"></i> Invalid credentials
                    </div>
                    <div th:if="${param.logout}" class="alert alert-success p-2 small mb-3 border-0" role="alert">
                        <i class="bi bi-check-circle-fill me-1"></i> Signed out
                    </div>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-2"> <label class="form-label small fw-bold text-secondary mb-1">Username</label>
                            <div class="input-group input-group-sm"> <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
                                <input type="text" name="username" class="form-control form-control-with-icon"
                                       placeholder="Username" required autofocus>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label small fw-bold text-secondary mb-1">Password</label>
                            <div class="input-group input-group-sm">
                                <span class="input-group-text"><i class="bi bi-key-fill"></i></span>
                                <input type="password" name="password" class="form-control form-control-with-icon"
                                       placeholder="Password" required>
                            </div>
                        </div>

                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <a href="/forgot-password" class="small text-custom">Forgot?</a>
                        </div>

                        <button type="submit" class="btn btn-primary btn-login w-100 mb-2 text-white shadow-sm">
                            SIGN IN <i class="bi  ms-1"></i>
                        </button>
                    </form>

                    <div class="text-center mt-3 pt-2 border-top">
                        <p class="small text-muted mb-0">New here?
                            <a href="/register" class="text-custom">Create Account</a>
                        </p>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
