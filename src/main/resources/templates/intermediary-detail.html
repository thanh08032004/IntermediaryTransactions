<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Invoice Detail</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/style.css}">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; }
        .card-invoice { max-width: 1000px; margin: 50px auto; background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 0 15px rgba(0,0,0,0.08); }
        table { width: 100%; }
        th { width: 25%; text-align: left; font-weight: 600; vertical-align: middle; }
        td { width: 75%; }
        .edit-input { display: none; width: 100%; }
        .view-text { display: inline-block; }
        .action-buttons { margin-top: 25px; text-align: center; }
        .img-thumb { width: 100px; height: 80px; object-fit: cover; border-radius: 5px; margin-right: 10px; position: relative; }
        .badge-main { position: absolute; top: 0; left: 0; font-size: 0.7rem; }
        .delete-btn { position: absolute; top:0; right:0; display: none; }
        textarea.edit-input { resize: vertical; }
    </style>
</head>
<body class="bg-light">
<div th:replace="~{layout/header :: header('Invoice Detail')}"></div>
<div class="layout">
    <div th:replace="~{layout/sidebar :: sidebar}"></div>

    <div class="content">
        <div class="card-invoice">
            <h4 class="mb-4 fw-bold text-primary"><i class="bi bi-receipt"></i> Invoice Detail</h4>

            <!-- SHARE LINK CHO SELLER -->
            <div class="mb-3" th:if="${invoice.sellerId == currentUser.id}">
                <label class="form-label fw-bold">Share Link:</label>
                <input type="text" class="form-control"
                       th:value="'http://localhost:8080/intermediary/join/' + ${invoice.shareToken}"
                       readonly onclick="this.select(); document.execCommand('copy');"/>
                <small class="text-muted">Click vào ô để copy link và gửi cho khách hàng để thanh toán.</small>
            </div>

            <!-- FORM EDIT CHỈ KHI PENDING + SELLER -->
            <form th:action="@{/intermediary/update/{id}(id=${invoice.invoiceId})}" th:object="${invoice}" method="post"
                  th:if="${invoice.status.name() == 'PENDING' and invoice.sellerId == currentUser.id}" enctype="multipart/form-data">
                <table class="table table-borderless">
                    <tr>
                        <th>Invoice ID</th>
                        <td><span class="view-text" th:text="${invoice.invoiceId}"></span></td>
                    </tr>
                    <tr>
                        <th>Code</th>
                        <td><span class="view-text" th:text="${invoice.invoiceCode}"></span></td>
                    </tr>
                    <tr>
                        <th>Subject</th>
                        <td>
                            <span class="view-text" th:text="${invoice.subject}"></span>
                            <input type="text" th:field="*{subject}" class="form-control edit-input"/>
                        </td>
                    </tr>
                    <tr>
                        <th>Price</th>
                        <td>
                            <span class="view-text" th:text="${#numbers.formatDecimal(invoice.price,0,'COMMA',0,'POINT')}"></span>
                            <input type="number" th:field="*{price}" class="form-control edit-input"/>
                        </td>
                    </tr>
                    <tr>
                        <th>Fee Payer</th>
                        <td>
                            <span class="view-text" th:text="${invoice.feePayer}"></span>
                            <select th:field="*{feePayer}" class="form-select edit-input">
                                <option th:value="BUYER" th:selected="${invoice.feePayer == T(hsf302.group3.intermediarytransactions.entity.FeePayer).BUYER}">Buyer</option>
                                <option th:value="SELLER" th:selected="${invoice.feePayer == T(hsf302.group3.intermediarytransactions.entity.FeePayer).SELLER}">Seller</option>
                            </select>
                        </td>
                    </tr>
                    <tr>
                        <th>Fee Amount</th>
                        <td>
                            <span class="view-text" th:text="${#numbers.formatDecimal(invoice.feeAmount,0,'COMMA',0,'POINT')}"></span>
                            <input type="text" id="feeAmount" class="form-control edit-input" readonly/>
                        </td>
                    </tr>
                    <tr>
                        <th>Buyer Total</th>
                        <td>
                            <span class="view-text" th:text="${#numbers.formatDecimal(invoice.buyerTotal,0,'COMMA',0,'POINT')}"></span>
                            <input type="text" id="buyerTotal" class="form-control edit-input" readonly/>
                        </td>
                    </tr>
                    <tr>
                        <th>Description</th>
                        <td>
                            <span class="view-text" th:text="${invoice.description}"></span>
                            <textarea th:field="*{description}" class="form-control edit-input" rows="3"></textarea>
                        </td>
                    </tr>
                    <tr>
                        <th>Contact</th>
                        <td>
                            <span class="view-text" th:text="${invoice.contactMethod}"></span>
                            <input type="text" th:field="*{contactMethod}" class="form-control edit-input"/>
                        </td>
                    </tr>
                    <tr>
                        <th>Hidden Info</th>
                        <td>
                            <span class="view-text" th:text="${invoice.hiddenInfo}"></span>
                            <textarea th:field="*{hiddenInfo}" class="form-control edit-input" rows="2"></textarea>
                        </td>
                    </tr>
                    <tr>
                        <th>Images</th>
                        <td>
                            <div class="d-flex flex-wrap gap-2">
                                <div th:each="img, iterStat : ${invoice.images}" class="position-relative">
                                    <img th:src="@{${img.imageUrl}}" class="img-thumb rounded border"/>
                                    <input type="checkbox" name="deleteImages" th:value="${img.id}" class="delete-checkbox" style="display:none"/>
                                    <button type="button" class="btn btn-sm btn-danger delete-btn">x</button>
                                    <span th:if="${img.isMain}" class="badge bg-primary badge-main">Main</span>
                                </div>
                            </div>
                            <input type="file" name="files" multiple class="form-control mt-2"/>
                        </td>
                    </tr>
                </table>

                <div class="action-buttons">
                    <button type="button" class="btn btn-warning px-4" id="btn-edit"><i class="bi bi-pencil-square"></i> Edit Invoice</button>
                    <div id="confirm-cancel" style="display: none;">
                        <button type="submit" class="btn btn-success px-4"><i class="bi bi-check-circle"></i> Confirm</button>
                        <button type="button" class="btn btn-secondary px-4" id="btn-cancel"><i class="bi bi-x-circle"></i> Cancel</button>
                    </div>
                </div>
            </form>

            <!-- VIEW-ONLY CHO NGƯỜI KHÁC HOẶC SAU KHI ĐÃ SUCCESS -->
            <table class="table table-borderless" th:if="${invoice.status.name() != 'PENDING' or invoice.sellerId != currentUser.id}">
                <tr><th>Invoice ID</th><td th:text="${invoice.invoiceId}"></td></tr>
                <tr><th>Code</th><td th:text="${invoice.invoiceCode}"></td></tr>
                <tr><th>Subject</th><td th:text="${invoice.subject}"></td></tr>
                <tr><th>Price</th><td th:text="${#numbers.formatDecimal(invoice.price,0,'COMMA',0,'POINT')}"></td></tr>
                <tr><th>Fee Amount</th><td th:text="${#numbers.formatDecimal(invoice.feeAmount,0,'COMMA',0,'POINT')}"></td></tr>
                <tr><th>Buyer Total</th><td th:text="${#numbers.formatDecimal(invoice.buyerTotal,0,'COMMA',0,'POINT')}"></td></tr>
                <tr><th>Description</th><td th:text="${invoice.description}"></td></tr>
                <tr><th>Contact</th><td th:text="${invoice.contactMethod}"></td></tr>
                <tr><th>Hidden Info</th><td th:text="${invoice.hiddenInfo}"></td></tr>
                <tr><th>Images</th>
                    <td>
                        <div class="d-flex flex-wrap gap-2">
                            <img th:each="img : ${invoice.images}" th:src="@{${img.imageUrl}}" class="img-thumb rounded border"/>
                        </div>
                    </td>
                </tr>
            </table>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", function() {
        const btnEdit = document.getElementById("btn-edit");
        const confirmCancel = document.getElementById("confirm-cancel");
        const btnCancel = document.getElementById("btn-cancel");

        if(btnEdit){
            btnEdit.addEventListener("click", function() {
                btnEdit.style.display = "none";
                confirmCancel.style.display = "inline-block";
                document.querySelectorAll(".edit-input").forEach(el => el.style.display = "inline-block");
                document.querySelectorAll(".view-text").forEach(el => el.style.display = "none");
                document.querySelectorAll(".delete-btn").forEach(el => el.style.display = "inline-block");
            });
        }

        if(btnCancel){
            btnCancel.addEventListener("click", function() {
                confirmCancel.style.display = "none";
                btnEdit.style.display = "inline-block";
                document.querySelectorAll(".edit-input").forEach(el => el.style.display = "none");
                document.querySelectorAll(".view-text").forEach(el => el.style.display = "inline-block");
                document.querySelectorAll(".delete-btn").forEach(el => el.style.display = "none");
            });
        }

        // Fee calculation
        function calculateFee() {
            const price = parseFloat(document.querySelector("[name='price']").value) || 0;
            const feePayer = document.querySelector("[name='feePayer']").value;
            let fee = 0;
            if (price <= 1000000) fee = price * 0.05;
            else if (price <= 5000000) fee = price * 0.03;
            else fee = price * 0.02;

            let buyerTotal = (feePayer === "BUYER") ? price + fee : price - fee;

            document.getElementById("feeAmount").value = fee.toFixed(0);
            document.getElementById("buyerTotal").value = buyerTotal.toFixed(0);
        }

        const priceInput = document.querySelector("[name='price']");
        const feePayerInput = document.querySelector("[name='feePayer']");
        if(priceInput && feePayerInput){
            priceInput.addEventListener("input", calculateFee);
            feePayerInput.addEventListener("change", calculateFee);
            calculateFee();
        }

        // Delete image
        document.querySelectorAll(".delete-btn").forEach(btn => {
            btn.addEventListener("click", function() {
                const container = btn.closest("div.position-relative");
                const checkbox = container.querySelector(".delete-checkbox");
                checkbox.checked = true;
                container.style.display = "none";
            });
        });
    });
</script>
</body>
</html>
