<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Seller Product List</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/style.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<!-- HEADER -->
<div th:replace="~{layout/header :: header('Home Page')}"></div>

<!-- LAYOUT -->
<div class="layout">

    <!-- SIDEBAR -->
    <div th:replace="~{layout/sidebar :: sidebar}"></div>
    <!-- CONTENT -->
    <div class="content">
        <div class="container mt-4">

            <!-- TITLE + ADD BUTTON -->
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h3 class="fw-bold">📦 My Products</h3>
                <a href="/seller-products/add" class="btn btn-success">
                    <i class="bi bi-plus-circle"></i> Add Product
                </a>
            </div>

            <!-- TABLE -->
            <div class="card shadow-sm">
                <div class="card-body p-0">
                    <table class="table table-hover mb-0 align-middle text-center">
                        <thead class="table-dark">
                        <tr>
                            <th>Name</th>
                            <th>Price</th>
                            <th>Status</th>
                            <th width="180">Action</th>
                        </tr>
                        </thead>

                        <tbody>
                        <tr th:each="p : ${products.content}">
                            <td class="fw-semibold" th:text="${p.name}"></td>

                            <td class="text-success fw-bold"
                                th:text="${#numbers.formatDecimal(p.price, 0, 'COMMA', 0, 'POINT')} + ' ₫'">
                            </td>

                            <td>
                        <span class="badge"
                              th:classappend="${p.status == 'ACTIVE'} ? 'bg-success' : 'bg-secondary'"
                              th:text="${p.status}">
                        </span>
                            </td>

                            <td>
                                <a class="btn btn-sm btn-primary me-1"
                                   th:href="@{/seller-products/edit/{id}(id=${p.id})}">
                                    <i class="bi bi-pencil"></i>
                                </a>

                                <a class="btn btn-sm btn-danger"
                                   th:href="@{/seller-products/delete/{id}(id=${p.id})}"
                                   onclick="return confirm('Delete this product?')">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </td>
                        </tr>

                        <!-- EMPTY -->
                        <tr th:if="${products.content.size() == 0}">
                            <td colspan="4" class="text-muted py-4">
                                No products found
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- PAGINATION -->
            <nav class="mt-4">
                <ul class="pagination justify-content-center">

                    <!-- PREVIOUS -->
                    <li class="page-item"
                        th:classappend="${currentPage == 0} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/seller-products(
                   page=${currentPage - 1},
                   keyword=${keyword},
                   categoryId=${categoryId})}">
                            <i class="bi bi-chevron-left"></i>
                        </a>
                    </li>

                    <!-- PAGE NUMBER -->
                    <li class="page-item"
                        th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                        th:classappend="${i == currentPage} ? 'active'">

                        <a class="page-link"
                           th:text="${i + 1}"
                           th:href="@{/seller-products(
                   page=${i},
                   keyword=${keyword},
                   categoryId=${categoryId})}">
                        </a>
                    </li>

                    <!-- NEXT -->
                    <li class="page-item"
                        th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/seller-products(
                   page=${currentPage + 1},
                   keyword=${keyword},
                   categoryId=${categoryId})}">
                            <i class="bi bi-chevron-right"></i>
                        </a>
                    </li>

                </ul>
            </nav>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
