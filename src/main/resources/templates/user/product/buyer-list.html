<!-- LAYOUT -->
<div class="layout">

    <!-- SIDEBAR -->
    <div th:replace="~{layout/sidebar :: sidebar}"></div>

    <!-- CONTENT -->
    <div class="content">
        <div class="container mt-4">

            <h3 class="mb-4">🛍 Product List</h3>

            <!-- SEARCH + FILTER -->
            <form method="get" th:action="@{/buyer-products}" class="row g-2 mb-4">

                <div class="col-md-3">
                    <input type="text"
                           name="keyword"
                           th:value="${keyword}"
                           class="form-control"
                           placeholder="Search product...">
                </div>

                <div class="col-md-2">
                    <select name="categoryId" class="form-select">
                        <option value="">All Categories</option>
                        <option th:each="c : ${categories}"
                                th:value="${c.id}"
                                th:text="${c.name}"
                                th:selected="${c.id == categoryId}">
                        </option>
                    </select>
                </div>

                <div class="col-md-2">
                    <button class="btn btn-primary w-100">
                        <i class="bi bi-search"></i> Search
                    </button>
                </div>

            </form>

            <!-- PRODUCT GRID -->
            <div class="table-responsive">

                <table class="table table-bordered table-hover align-middle bg-white shadow-sm">

                    <thead class="table-dark text-center">
                    <tr>
                        <th>#</th>
                        <th>Image</th>
                        <th>Name</th>
                        <th>Category</th>
                        <th>Price</th>
                        <th>Action</th>
                    </tr>
                    </thead>

                    <tbody>

                    <tr th:each="p, stat : ${products.content}">

                        <!-- STT -->
                        <td class="text-center"
                            th:text="${stat.index + 1 + currentPage * 5}"></td>

                        <!-- IMAGE -->
                        <td class="text-center">
                            <img th:src="@{${p.mainImageUrl}}"
                                 style="width:80px; height:80px; object-fit:cover;">
                        </td>

                        <!-- NAME -->
                        <td th:text="${p.name}"></td>

                        <!-- CATEGORY -->
                        <td th:text="${p.category != null ? p.category.name : 'N/A'}"></td>

                        <!-- PRICE -->
                        <td class="text-danger fw-bold"
                            th:text="${#numbers.formatDecimal(p.price,0,'COMMA',0,'POINT')} + ' $'">
                        </td>

                        <!-- ACTION -->
                        <td class="text-center">
                            <a th:href="@{/buyer-products/view/{id}(id=${p.id})}"
                               class="btn btn-sm btn-outline-primary">
                                <i class="bi bi-eye"></i> View
                            </a>
                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

            <!-- EMPTY -->
            <div th:if="${products.totalElements == 0}" class="text-center text-muted">
                No products found
            </div>

            <!-- PAGINATION -->
            <nav class="mt-4">
                <ul class="pagination justify-content-center">

                    <!-- PREVIOUS -->
                    <li class="page-item"
                        th:classappend="${currentPage == 0} ? 'disabled'">

                        <a class="page-link"
                           th:href="@{/buyer-products(
                               page=${currentPage - 1},
                               keyword=${keyword},
                               categoryId=${categoryId}
                               )}">
                            Previous
                        </a>
                    </li>

                    <!-- PAGE -->
                    <li class="page-item"
                        th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                        th:classappend="${i == currentPage} ? 'active'">

                        <a class="page-link"
                           th:text="${i + 1}"
                           th:href="@{/buyer-products(
                               page=${i},
                               keyword=${keyword},
                               categoryId=${categoryId}
                               )}">
                        </a>
                    </li>

                    <!-- NEXT -->
                    <li class="page-item"
                        th:classappend="${currentPage + 1 == totalPages} ? 'disabled'">

                        <a class="page-link"
                           th:href="@{/buyer-products(
                               page=${currentPage + 1},
                               keyword=${keyword},
                               categoryId=${categoryId})}">
                            Next
                        </a>
                    </li>

                </ul>
            </nav>

        </div>
    </div>

</div>
