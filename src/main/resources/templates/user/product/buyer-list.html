<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Buyer Product List</title>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icon -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/style.css}">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f5f5f5;
        }

        .table img {
            width: 80px;
            height: 60px;
            object-fit: cover;
            border-radius: 6px;
        }

        /* Zebra striping */
        .table tbody tr:nth-child(odd) {
            background-color: #f9f9f9 !important; /* màu xám nhạt cho hàng lẻ */
        }

        .table tbody tr:nth-child(even) {
            background-color: #ffffff !important; /* màu trắng cho hàng chẵn */
        }

        /* Hover */
        .table tbody tr:hover {
            background-color: #e6f2ff !important; /* highlight khi hover */
        }

        .btn-danger {
            background-color: #ee4d2d;
            border: none;
        }

        .btn-danger:hover {
            background-color: #d8432a;
        }

        .table thead th {
            vertical-align: middle;
            text-align: center;
        }

        .table tbody td {
            vertical-align: middle;
        }
    </style></head>
<body class="bg-light">

<!-- HEADER -->
<div th:replace="~{layout/header :: header('Product List')}"></div>

<div class="layout">

    <!-- SIDEBAR -->
    <div th:replace="~{layout/sidebar :: sidebar}"></div>

    <!-- CONTENT -->
    <div class="content">
        <div class="container mt-4">

            <h3 class="mb-4">🛍 Product List</h3>
            <div th:if="${success}" class="alert alert-success">
                <span th:text="${success}"></span>
            </div>

            <div th:if="${error}" class="alert alert-danger">
                <span th:text="${error}"></span>
            </div>
            <!-- SEARCH + FILTER -->
            <form method="get" th:action="@{/buyer-products}" class="row g-2 mb-4">

                <div class="col-md-3">
                    <input type="text"
                           name="keyword"
                           th:value="${keyword}"
                           class="form-control"
                           placeholder="Search product...">
                </div>

                <div class="col-md-2">
                    <select name="categoryId" class="form-select">
                        <option value="">All Categories</option>
                        <option th:each="c : ${categories}"
                                th:value="${c.id}"
                                th:text="${c.name}"
                                th:selected="${c.id == categoryId}">
                        </option>
                    </select>
                </div>

                <div class="col-md-2">
                    <button class="btn btn-danger w-100">
                        <i class="bi bi-search"></i> Search
                    </button>
                </div>

            </form>

            <!-- PRODUCT TABLE -->
            <div class="table-responsive">
                <table class="table table-hover align-middle bg-white shadow-sm">

                    <thead class="table-light">
                    <tr>
                        <th>#</th>
                        <th>Image</th>
                        <th>Name</th>
                        <th>Category</th>
                        <th>Price</th>
                        <th>Quantity</th>
                        <th>Supplier</th>
                        <th>Created At</th>
                        <th class="text-center">Action</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="p, stat : ${products.content}">

                        <!-- STT -->
                        <td class="text-center"
                            th:text="${stat.index + 1 + currentPage * products.size}"></td>

                        <!-- IMAGE -->
                        <td class="text-center">
                            <img th:src="@{${p.mainImageUrl}}" alt="Product Image">
                        </td>

                        <!-- NAME -->
                        <td th:text="${p.name}"></td>

                        <!-- CATEGORY -->
                        <td th:text="${p.category != null ? p.category.name : 'N/A'}"></td>

                        <!-- PRICE -->
                        <td class="text-danger fw-bold"
                            th:text="${#numbers.formatDecimal(p.price,0,'COMMA',0,'POINT')} + ' đ'"></td>

                        <!-- QUANTITY -->
                        <td class="text-center" th:text="${p.availableQuantity}"></td>

                        <!-- SUPPLIER -->
                        <td th:text="${p.supplier != null ? p.supplier.username : 'N/A'}"></td>

                        <!-- CREATED AT -->
                        <td th:text="${#temporals.format(p.createdAt, 'dd/MM/yyyy HH:mm')}"></td>

                        <!-- ACTION -->
                        <td class="text-center d-flex justify-content-center gap-1">

                            <!-- VIEW PRODUCT -->
                            <a th:href="@{/buyer-products/view/{id}(id=${p.id})}"
                               class="btn btn-sm btn-outline-primary d-flex align-items-center gap-1">
                                <i class="bi bi-eye"></i> View
                            </a>

                            <!-- ADD TO CART -->
                            <form th:action="@{/cart/add}" method="post" class="d-inline">

                                <input type="hidden" name="productId" th:value="${p.id}" />
                                <input type="hidden" name="quantity" value="1" />

                                <button type="submit"
                                        class="btn btn-success btn-sm d-flex align-items-center gap-1">
                                    <i class="bi bi-cart-plus fs-5"></i> Add
                                </button>

                            </form>

                        </td>

                    </tr>
                    </tbody>

                </table>
            </div>

            <!-- EMPTY STATE -->
            <div th:if="${products.totalElements == 0}" class="text-center text-muted mt-4">
                No products found
            </div>

            <!-- PAGINATION -->
            <nav class="mt-4" th:if="${products.totalPages > 1}">
                <ul class="pagination justify-content-center">

                    <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/buyer-products(page=${currentPage - 1}, keyword=${keyword}, categoryId=${categoryId})}">
                            «
                        </a>
                    </li>

                    <li class="page-item"
                        th:each="i : ${#numbers.sequence(0, products.totalPages - 1)}"
                        th:classappend="${i == currentPage} ? 'active'">
                        <a class="page-link"
                           th:text="${i + 1}"
                           th:href="@{/buyer-products(page=${i}, keyword=${keyword}, categoryId=${categoryId})}"></a>
                    </li>

                    <li class="page-item" th:classappend="${currentPage + 1 == products.totalPages} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/buyer-products(page=${currentPage + 1}, keyword=${keyword}, categoryId=${categoryId})}">
                            »
                        </a>
                    </li>

                </ul>
            </nav>

        </div>
    </div>

</div>
</body>
</html>
