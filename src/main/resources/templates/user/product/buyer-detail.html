<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Product Detail</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/style.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>


<!-- HEADER -->
<div th:replace="~{layout/header :: header('Home Page')}"></div>

<!-- LAYOUT -->
<div class="layout">
    <!-- SIDEBAR -->
    <div th:replace="~{layout/sidebar :: sidebar}"></div>

<!-- LAYOUT -->
<div class="layout">

    <!-- SIDEBAR -->
    <div th:replace="~{layout/sidebar :: sidebar}"></div>

    <!-- CONTENT -->
    <div class="content">
    <div class="container mt-4">

        <!-- BACK -->
        <a th:href="@{/buyer-products}" class="btn btn-outline-secondary mb-3">
            ← Back to list
        </a>

        <div class="row">

            <!-- IMAGE -->
            <div class="col-md-5">
                <div class="card shadow-sm">
                    <img th:src="@{${product.mainImageUrl}}"
                         class="img-fluid rounded"
                         style="height:350px; object-fit:cover;">
                </div>
            </div>

            <!-- INFO -->
            <div class="col-md-7">

                <h3 th:text="${product.name}"></h3>

                <p class="text-muted"
                   th:text="${product.category != null ? product.category.name : 'N/A'}"></p>

                <!-- PRICE -->
                <h4 class="text-danger mb-3"
                    th:text="${#numbers.formatDecimal(product.price,0,'COMMA',0,'POINT')} + ' $'">
                </h4>

                <!-- QUANTITY -->
                <p class="mt-3">
                    <strong>Stock:</strong>
                    <span th:text="${product.quantity}"></span>
                </p>

                <!-- DESCRIPTION -->
                <div class="mt-3">
                    <h5>Description</h5>
                    <p th:text="${product.description}"></p>
                </div>

                <!-- ACTION -->
                <div class="mt-4">

                    <button class="btn btn-success me-2">
                        <i class="bi bi-cart-plus"></i> Add to Cart
                    </button>

                    <button class="btn btn-outline-danger">
                        <i class="bi bi-heart"></i> Wishlist
                    </button>

                </div>

            </div>

        </div>

        <!-- MORE IMAGES -->
        <div class="mt-5" th:if="${product.images != null}">
            <h5>More Images</h5>

            <div class="row">
                <div class="col-md-2 mb-3"
                     th:each="img : ${product.images}">

                    <img th:src="@{${img.imageUrl}}"
                         class="img-fluid rounded border"
                         style="height:100px; object-fit:cover;">
                </div>
            </div>
        </div>
    </div>
        </div>
</div>
</div>
</body>
</html>
