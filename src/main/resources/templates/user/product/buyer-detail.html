<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Product Detail</title>

    <!-- Font + Bootstrap -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/style.css}">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
        }

        /* CARD */
        .product-card {
            background: #fff;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            max-width: 900px;
            margin: 40px auto;
        }

        /* ===== IMAGE GRID ===== */
        .image-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            max-width: 400px;
            margin: 0 auto 20px;
        }

        /* TẤT CẢ ẢNH */
        .product-img {
            width: 100%;
            height: 200px; /* tất cả bằng nhau */
            object-fit: cover;
            border-radius: 10px;
            border: 1px solid #ddd;
            cursor: pointer;
            transition: 0.2s;
        }

        .product-img:hover {
            transform: scale(1.03);
            border-color: #0d6efd;
        }

        /* INFO */
        .form-control.bg-light {
            background-color: #f8f9fa !important;
        }

        /* ACTION */
        .product-actions {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
        }

        .quantity-input {
            width: 80px;
            text-align: center;
        }
    </style>
</head>

<body>

<div th:replace="~{layout/header :: header('Product Detail')}"></div>

<div class="layout">

    <div th:replace="~{layout/sidebar :: sidebar}"></div>

    <div class="content">

        <div class="container mt-4">
            <div class="row">

                <div class="col-md-10 mx-auto">

                    <div class="product-card">

                        <!-- IMAGE GRID -->
                        <div class="image-grid">

                            <!-- MAIN IMAGE -->
                            <img th:src="@{${product.mainImageUrl}}"
                                 class="product-img">

                            <!-- OTHER IMAGES -->
                            <img th:each="img : ${product.images}"
                                 th:src="@{${img.imageUrl}}"
                                 onclick="changeMainImage(this)"
                                 class="product-img">

                        </div>

                        <!-- INFO -->
                        <div class="row g-3 mt-3">

                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Product Name</label>
                                <div class="form-control bg-light" th:text="${product.name}"></div>
                            </div>

                            <div class="col-md-3">
                                <label class="form-label fw-semibold">Price</label>
                                <div class="form-control bg-light text-danger fw-bold"
                                     th:text="${#numbers.formatDecimal(product.price,0,'COMMA',0,'POINT')} + ' đ'">
                                </div>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Category</label>
                                <div class="form-control bg-light"
                                     th:text="${product.category != null ? product.category.name : 'N/A'}"></div>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Supplier</label>
                                <div class="form-control bg-light"
                                     th:text="${product.supplier != null ? product.supplier.username : 'N/A'}"></div>
                            </div>

                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Quantity</label>
                                <div class="form-control bg-light"
                                     th:text="${product.availableQuantity}"></div>
                            </div>

                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Status</label>
                                <div class="form-control bg-light"
                                     th:text="${product.status}"></div>
                            </div>

                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Created At</label>
                                <div class="form-control bg-light"
                                     th:text="${#temporals.format(product.createdAt, 'dd/MM/yyyy HH:mm')}"></div>
                            </div>

                            <div class="col-12">
                                <label class="form-label fw-semibold">Description</label>
                                <div class="form-control bg-light"
                                     style="min-height: 80px"
                                     th:text="${product.description}"></div>
                            </div>

                        </div>

                        <!-- ACTION -->
                        <div class="product-actions">
                            <input type="number" id="quantity" value="1" min="1"
                                   th:attr="max=${product.availableQuantity}"
                                   class="form-control quantity-input">

                            <form th:action="@{/cart/add}" method="post">
                                <input type="hidden" name="productId" th:value="${product.id}">
                                <input type="hidden" id="hiddenQuantity" name="quantity" value="1">

                                <button class="btn btn-success">
                                    <i class="bi bi-cart-plus"></i> Add to Cart
                                </button>
                            </form>
                        </div>

                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- SCRIPT -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const quantityInput = document.getElementById('quantity');
    const hiddenQuantity = document.getElementById('hiddenQuantity');

    quantityInput.addEventListener('input', () => {
        hiddenQuantity.value = quantityInput.value;
    });

    function changeMainImage(img) {
        document.querySelector('.image-grid img').src = img.src;
    }
</script>

</body>
</html>
