<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Product</title>
    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icon -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/style.css}">
</head>

<body class="bg-light">

<div th:replace="~{layout/header :: header('Thêm sản phẩm')}"></div>
<div class="layout">

    <!-- SIDEBAR -->
    <div th:replace="~{layout/sidebar :: sidebar}"></div>

    <!-- CONTENT -->
    <div class="content">

<div class="container mt-5" style="max-width: 900px">

    <div class="card shadow-sm border-0">
        <div class="card-body p-4">

            <h4 class="mb-4 fw-bold text-primary">
                <i class="bi bi-plus-circle"></i> Add Product
            </h4>

            <form th:action="@{/seller-products/add}"
                  th:object="${product}"
                  method="post"
                  enctype="multipart/form-data">

                <div class="row">

                    <!-- NAME -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold">Product Name</label>
                        <input type="text" th:field="*{name}" class="form-control">
                        <div class="text-danger small" th:errors="*{name}"></div>
                    </div>

                    <!-- PRICE -->
                    <div class="col-md-3 mb-3">
                        <label class="form-label fw-semibold">Price</label>
                        <input type="number" step="0.01" th:field="*{price}" class="form-control">
                    </div>

                    <!-- CATEGORY -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold">Category</label>
                        <select th:field="*{category.id}" class="form-select">
                            <option value="">-- Select Category --</option>
                            <option th:each="c : ${categories}"
                                    th:value="${c.id}"
                                    th:text="${c.name}">
                            </option>
                        </select>
                    </div>

                    <!-- STATUS -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold">Status</label>
                        <select th:field="*{status}" class="form-select">
                            <option value="ACTIVE"> ACTIVE</option>
                            <option value="INACTIVE"> INACTIVE</option>
                        </select>
                    </div>

                    <!-- DESCRIPTION -->
                    <div class="col-12 mb-3">
                        <label class="form-label fw-semibold">Description</label>
                        <textarea th:field="*{description}"
                                  rows="3"
                                  class="form-control"
                                  placeholder="Enter product description..."></textarea>
                    </div>

                    <!-- IMAGE UPLOAD -->
                    <div class="col-12 mb-3">
                        <label class="form-label fw-semibold">Upload Images</label>
                        <input type="file"
                               th:field="*{uploadedFiles}"
                               multiple
                               class="form-control"
                               onchange="previewImages(event)">
                        <small class="text-muted">Bạn có thể chọn nhiều ảnh</small>
                    </div>

                    <!-- PREVIEW -->
                    <div class="col-12 mb-3">
                        <div id="preview"
                             class="d-flex flex-wrap gap-3 border rounded p-3 bg-white">
                        </div>
                    </div>

                    <!-- MAIN IMAGE -->
                    <div class="col-md-4 mb-3">
                        <label class="form-label fw-semibold">Main Image Index</label>
                        <input type="number"
                               name="mainIndex"
                               class="form-control"
                               placeholder="0, 1, 2...">
                    </div>

                </div>

                <!-- BUTTON -->
                <div class="d-flex justify-content-between mt-4">
                    <a href="/seller-products" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-left"></i> Back
                    </a>

                    <button type="submit" class="btn btn-success px-4">
                        <i class="bi bi-save"></i> Save
                    </button>
                </div>

            </form>

        </div>
    </div>
</div>

    </div>
</div>

<script>
    function previewImages(event) {
        const preview = document.getElementById('preview');
        preview.innerHTML = "";

        const files = event.target.files;

        for (let i = 0; i < files.length; i++) {
            const reader = new FileReader();

            reader.onload = function (e) {
                const wrapper = document.createElement("div");
                wrapper.style.position = "relative";

                const img = document.createElement("img");
                img.src = e.target.result;
                img.style.width = "120px";
                img.style.height = "120px";
                img.style.objectFit = "cover";
                img.classList.add("rounded", "border");

                const index = document.createElement("span");
                index.innerText = i;
                index.style.position = "absolute";
                index.style.top = "5px";
                index.style.left = "5px";
                index.style.background = "black";
                index.style.color = "white";
                index.style.padding = "2px 6px";
                index.style.fontSize = "12px";
                index.style.borderRadius = "4px";

                wrapper.appendChild(img);
                wrapper.appendChild(index);
                preview.appendChild(wrapper);
            }

            reader.readAsDataURL(files[i]);
        }
    }
</script>

</body>
</html>
