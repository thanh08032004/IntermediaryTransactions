<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Product Items</title>
    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icon -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/style.css}">
    <style>
        body {
            background: #f5f5f5;
        }

        .table tbody tr:hover {
            background-color: #e6f2ff;
        }
    </style>
</head>

<body class="bg-light">

<!-- HEADER -->
<div th:replace="~{layout/header :: header('My Products')}"></div>

<div class="layout">

    <!-- SIDEBAR -->
    <div th:replace="~{layout/sidebar :: sidebar}"></div>

    <!-- CONTENT -->
    <div class="content">

<div class="container mt-4">

    <!-- TITLE -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3>
            📦 Product Items - <span th:text="${product.name}"></span>
        </h3>

        <a th:href="@{/product-items/add/{productId}(productId=${product.id})}"
           class="btn btn-success">
            <i class="bi bi-plus-circle"></i> Add Item
        </a>
    </div>

    <!-- TABLE -->
    <div class="table-responsive">
        <table class="table table-bordered bg-white">

            <thead class="table-light">
            <tr>
                <th>#</th>
                <th>Description</th>
                <th>Status</th>
                <th>Buyer</th>
                <th>Sold At</th>
                <th class="text-center">Action</th>
            </tr>
            </thead>

            <tbody>

            <tr th:each="item, stat : ${items}">
                <td th:text="${stat.index + 1}"></td>

                <!-- DESCRIPTION -->
                <td th:text="${item.description}"></td>

                <!-- STATUS -->
                <td>
                    <span class="badge bg-success" th:if="${item.status.name() == 'AVAILABLE'}">AVAILABLE</span>
                    <span class="badge bg-danger" th:if="${item.status.name() == 'SOLD'}">SOLD</span>
                </td>

                <!-- BUYER -->
                <td th:text="${item.buyer != null ? item.buyer.username : 'N/A'}"></td>

                <!-- SOLD TIME -->
                <td th:text="${item.soldAt != null ? #temporals.format(item.soldAt, 'dd/MM/yyyy HH:mm') : '-'}"></td>

                <!-- ACTION -->
                <td class="text-center">
                    <div class="d-flex justify-content-center gap-1">

                        <!-- VIEW -->
                        <a th:href="@{/seller-products/items/{id}(id=${item.id})}"
                           class="btn btn-sm btn-outline-primary">
                            <i class="bi bi-eye"></i>
                        </a>

                        <!-- DELETE -->
                        <button class="btn btn-danger btn-sm"
                                data-bs-toggle="modal"
                                data-bs-target="#deleteModal"
                                th:attr="data-id=${item.id}">
                            <i class="bi bi-trash"></i>
                        </button>

                    </div>
                </td>

            </tr>

            </tbody>
        </table>
    </div>

    <!-- EMPTY -->
    <div th:if="${#lists.isEmpty(items)}" class="text-center text-muted mt-4">
        No items found
    </div>

</div>
    </div>

</div>
<!-- DELETE MODAL -->
<div class="modal fade" id="deleteModal">
    <div class="modal-dialog mt-5">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="text-danger">Confirm Delete</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                Delete this item?
            </div>

            <div class="modal-footer">
                <form id="deleteForm" method="post">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-danger">Delete</button>
                </form>
            </div>

        </div>
    </div>
</div>

<script>
    const deleteModal = document.getElementById('deleteModal');

    deleteModal.addEventListener('show.bs.modal', function (event) {
        const button = event.relatedTarget;
        const id = button.getAttribute('data-id');

        document.getElementById('deleteForm').action =
            '/seller-products/items/delete/' + id;
    });
</script>

</body>
</html>
