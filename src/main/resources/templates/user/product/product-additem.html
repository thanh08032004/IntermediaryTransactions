<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Product Item</title>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body class="bg-light">

<div th:replace="~{layout/header :: header('Add Item')}"></div>

<div class="layout">
    <div th:replace="~{layout/sidebar :: sidebar}"></div>

    <div class="content">
        <div class="container mt-4">

            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3>➕ Add Item for <span th:text="${product.name}"></span></h3>
                <a th:href="@{/product-items/list/{productId}(productId=${product.id})}" class="btn btn-secondary">
                    <i class="bi bi-arrow-left"></i> Back
                </a>
            </div>

            <form th:action="@{/product-items/add/{productId}(productId=${product.id})}"
                  th:object="${productItem}" method="post">

                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <textarea class="form-control" th:field="*{description}" rows="3"
                              placeholder="Enter item description"></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">Status</label>
                    <select class="form-select" th:field="*{status}">
                        <option th:value="${T(hsf302.group3.intermediarytransactions.entity.ItemStatus).AVAILABLE}">
                            AVAILABLE
                        </option>
                        <option th:value="${T(hsf302.group3.intermediarytransactions.entity.ItemStatus).SOLD}">
                            SOLD
                        </option>
                    </select>
                </div>

                <button type="submit" class="btn btn-success">
                    <i class="bi bi-plus-circle"></i> Add Item
                </button>
            </form>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
