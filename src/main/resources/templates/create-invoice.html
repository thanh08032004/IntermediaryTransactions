<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Intermediary Invoice</title>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icon -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/style.css}">
</head>

<body class="bg-light">

<div th:replace="~{layout/header :: header('Tạo đơn trung gian')}"></div>

<div class="layout">

    <!-- SIDEBAR -->
    <div th:replace="~{layout/sidebar :: sidebar}"></div>

    <!-- CONTENT -->
    <div class="content">

        <div class="container mt-5" style="max-width: 1000px">

            <div class="card shadow-sm border-0">
                <div class="card-body p-4">

                    <h4 class="mb-4 fw-bold text-primary">
                        <i class="bi bi-receipt"></i> Create Intermediary Invoice
                    </h4>

                    <form th:action="@{/invoices/create}"
                          th:object="${invoice}"
                          method="post"
                          enctype="multipart/form-data">

                        <div class="row">

                            <!-- SUBJECT -->
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Subject</label>
                                <input type="text" th:field="*{subject}" class="form-control">
                            </div>

                            <!-- PRICE -->
                            <div class="col-md-3 mb-3">
                                <label class="form-label fw-semibold">Price</label>
                                <input type="number" step="0.01" th:field="*{price}" class="form-control">
                            </div>

                            <!-- FEE PAYER -->
                            <div class="col-md-3 mb-3">
                                <label class="form-label fw-semibold">Fee Payer</label>
                                <select th:field="*{feePayer}" class="form-select">
                                    <option value="BUYER">Buyer</option>
                                    <option value="SELLER">Seller</option>
                                </select>
                            </div>

                            <!-- DESCRIPTION -->
                            <div class="col-12 mb-3">
                                <label class="form-label fw-semibold">Description</label>
                                <textarea th:field="*{description}"
                                          rows="3"
                                          class="form-control"
                                          placeholder="Mô tả sản phẩm / giao dịch..."></textarea>
                            </div>

                            <!-- CONTACT -->
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Contact Method</label>
                                <input type="text" th:field="*{contactMethod}" class="form-control">
                            </div>

                            <!-- HIDDEN INFO -->
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Hidden Info</label>
                                <input type="text" th:field="*{hiddenInfo}" class="form-control">
                            </div>

                            <!-- IMAGE UPLOAD -->
                            <div class="col-12 mb-3">
                                <label class="form-label fw-semibold">Upload Images</label>
                                <input type="file"
                                       name="files"
                                       multiple
                                       class="form-control"
                                       onchange="previewImages(event)">
                                <small class="text-muted">Chọn nhiều ảnh nếu cần</small>
                            </div>

                            <!-- PREVIEW -->
                            <div class="col-12 mb-3">
                                <div id="preview"
                                     class="d-flex flex-wrap gap-3 border rounded p-3 bg-white">
                                </div>
                            </div>

                            <!-- MAIN IMAGE -->
                            <div class="col-md-4 mb-3">
                                <label class="form-label fw-semibold">Main Image Index</label>
                                <input type="number"
                                       name="mainIndex"
                                       class="form-control"
                                       placeholder="0, 1, 2...">
                            </div>

                        </div>

                        <!-- BUTTON -->
                        <div class="d-flex justify-content-between mt-4">
                            <a href="/invoices" class="btn btn-outline-secondary">
                                <i class="bi bi-arrow-left"></i> Back
                            </a>

                            <button type="submit" class="btn btn-success px-4">
                                <i class="bi bi-save"></i> Create Invoice
                            </button>
                        </div>

                    </form>

                </div>
            </div>
        </div>

    </div>
</div>

<script>
    function previewImages(event) {
        const preview = document.getElementById('preview');
        preview.innerHTML = "";

        const files = event.target.files;

        for (let i = 0; i < files.length; i++) {
            const reader = new FileReader();

            reader.onload = function (e) {
                const wrapper = document.createElement("div");
                wrapper.style.position = "relative";

                const img = document.createElement("img");
                img.src = e.target.result;
                img.style.width = "120px";
                img.style.height = "120px";
                img.style.objectFit = "cover";
                img.classList.add("rounded", "border");

                const index = document.createElement("span");
                index.innerText = i;
                index.style.position = "absolute";
                index.style.top = "5px";
                index.style.left = "5px";
                index.style.background = "black";
                index.style.color = "white";
                index.style.padding = "2px 6px";
                index.style.fontSize = "12px";
                index.style.borderRadius = "4px";

                wrapper.appendChild(img);
                wrapper.appendChild(index);
                preview.appendChild(wrapper);
            }

            reader.readAsDataURL(files[i]);
        }
    }
</script>

</body>
</html>
