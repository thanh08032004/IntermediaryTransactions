<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Profile - HSF System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">
<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-dark text-white">
                    <h4 class="mb-0"><i class="bi bi-gear-fill me-2"></i>Update Personal Information</h4>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/profile/update}" th:object="${user}" method="post">
                        <div class="row">
                            <div class="col-md-12 mb-4 text-center">
                                <img th:src="${user.profile?.avatar != null && !user.profile.avatar.isEmpty() ? user.profile.avatar : 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}"
                                     class="rounded-circle border mb-2" style="width: 100px; height: 100px; object-fit: cover;">
                                <div class="small text-muted">Avatar preview</div>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Full Name</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                                    <input type="text" th:field="*{profile.fullname}" class="form-control" required>
                                </div>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Email</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                    <input type="email" th:field="*{profile.email}" class="form-control">
                                </div>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Phone</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-telephone"></i></span>
                                    <input type="text" th:field="*{profile.phone}" class="form-control">
                                </div>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Date of Birth</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-calendar-date"></i></span>
                                    <input type="date"
                                           th:name="profile.dateOfBirth"
                                           th:value="${user.profile?.dateOfBirth != null ? #temporals.format(user.profile.dateOfBirth, 'yyyy-MM-dd') : ''}"
                                           class="form-control"
                                           th:classappend="${#fields.hasErrors('profile.dateOfBirth')} ? 'is-invalid' : ''">

                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('profile.dateOfBirth')}"
                                         th:errors="*{profile.dateOfBirth}">Invalid date</div>
                                </div>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Gender</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-gender-ambiguous"></i></span>
                                    <select th:field="*{profile.gender}" class="form-select">
                                        <option value="MALE">Male</option>
                                        <option value="FEMALE">Female</option>
                                        <option value="OTHER">Other</option>
                                    </select>
                                </div>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Avatar URL</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-link-45deg"></i></span>
                                    <input type="text" th:field="*{profile.avatar}" class="form-control" placeholder="Link to your photo">
                                </div>
                            </div>

                            <div class="col-md-12 mb-3">
                                <label class="form-label fw-bold">About Me (Bio)</label>
                                <textarea th:field="*{profile.description}" class="form-control" rows="4" placeholder="Tell the world about you..."></textarea>
                            </div>
                        </div>

                        <div class="mt-4 border-top pt-3 d-flex justify-content-end gap-2">
                            <a href="/profile" class="btn btn-outline-secondary px-4">Cancel</a>
                            <button type="submit" class="btn btn-success px-5">
                                <i class="bi bi-save me-2"></i>Save Changes
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
