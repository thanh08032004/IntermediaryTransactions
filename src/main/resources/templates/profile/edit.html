    <!DOCTYPE html>
    <html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>Edit Profile - HSF System</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    </head>
    <body class="bg-light">
    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-dark text-white">
                        <h4 class="mb-0"><i class="bi bi-gear-fill me-2"></i>Update Personal Information</h4>
                    </div>
                    <div class="card-body p-4">
                        <!-- Runtime error (trung email/phone) -->
                        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show mb-3">
                            <i class="bi bi-x-octagon-fill me-2"></i>
                            <span th:text="${errorMessage}"></span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                        <form th:action="@{/profile/update}" th:object="${profile}" method="post">

                            <div class="row">
                                <div class="col-md-12 mb-4 text-center">
                                    <img th:src="${profile.avatar != null && !profile.avatar.isEmpty()
                          ? profile.avatar
                          : 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}"
                                         class="rounded-circle border mb-2"
                                         style="width: 100px; height: 100px; object-fit: cover;">
                                    <div class="small text-muted">Avatar preview</div>
                                </div>

                                <!-- Full Name -->
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Full Name</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                                        <input type="text" class="form-control"
                                               th:field="*{fullname}"
                                               th:classappend="${#fields.hasErrors('fullname')} ? 'is-invalid'">
                                    </div>
                                    <div class="text-danger small mt-1" th:errors="*{fullname}"></div>
                                </div>

                                <!-- Email -->
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Email</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                        <input type="email" class="form-control"
                                               th:field="*{email}"
                                               th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'">
                                    </div>
                                    <div class="text-danger small mt-1" th:errors="*{email}"></div>
                                </div>

                                <!-- Phone -->
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Phone</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-telephone"></i></span>
                                        <input type="text" class="form-control"
                                               th:field="*{phone}"
                                               th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid'">
                                    </div>
                                    <div class="text-danger small mt-1" th:errors="*{phone}"></div>
                                </div>

                                <!-- Birthday -->
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Date of Birth</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-calendar-date"></i></span>
                                        <input type="date" class="form-control"
                                               th:field="*{dateOfBirth}">
                                    </div>
                                </div>

                                <!-- Gender -->
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Gender</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-gender-ambiguous"></i></span>
                                        <select class="form-select" th:field="*{gender}">
                                            <option value="MALE">Male</option>
                                            <option value="FEMALE">Female</option>
                                            <option value="OTHER">Other</option>
                                        </select>
                                    </div>
                                </div>

                                <!-- Avatar -->
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Avatar URL</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-link-45deg"></i></span>
                                        <input type="text" class="form-control" th:field="*{avatar}">
                                    </div>
                                </div>

                                <!-- Bio -->
                                <div class="col-md-12 mb-3">
                                    <label class="form-label fw-bold">About Me (Bio)</label>
                                    <textarea class="form-control" rows="4" th:field="*{description}"></textarea>
                                </div>
                            </div>

                            <div class="mt-4 border-top pt-3 d-flex justify-content-end gap-2">
                                <a href="/profile" class="btn btn-outline-secondary px-4">Cancel</a>
                                <button type="submit" class="btn btn-success px-5">
                                    <i class="bi bi-save me-2"></i>Save Changes
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    </body>
    </html>
