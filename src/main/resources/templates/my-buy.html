<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Đơn mua của tôi</title>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icon -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/style.css}">
</head>


<body class="bg-light">

<!-- HEADER -->
<div th:replace="~{layout/header :: header('Home Page')}"></div>

<!-- LAYOUT -->
<div class="layout">

    <!-- SIDEBAR -->
    <div th:replace="~{layout/sidebar :: sidebar}"></div>

    <!-- CONTENT -->
    <div class="content">

<div class="container mt-4">

    <h3 class="mb-3">📦 Đơn mua của tôi</h3>

    <!-- 🔍 SEARCH -->
    <form method="get" th:action="@{/market/my-buy}">
        <div class="d-flex gap-2 mb-3">
            <input type="text"
                   name="keyword"
                   class="form-control"
                   placeholder="🔍 Tìm mã đơn..."
                   th:value="${keyword}">

            <input type="hidden" name="status" th:value="${currentStatus}">

            <button class="btn btn-danger">Tìm</button>
        </div>
    </form>

    
    <!-- EMPTY -->
    <div th:if="${#lists.isEmpty(orders)}" class="alert alert-warning text-center">
        Không có đơn hàng
    </div>

    <!-- LIST -->
    <div th:each="o : ${orders}" class="card mb-3 shadow border-0">

        <div class="card-body">

            <!-- HEADER -->
            <div class="d-flex justify-content-between align-items-center">

                <div>
                    <h6 class="mb-0 fw-bold" th:text="${o.orderCode}"></h6>
                    <small class="text-muted"
                           th:text="${#dates.format(o.createdAt,'dd/MM/yyyy HH:mm')}">
                    </small>
                </div>

                <div>
                    <span class="badge bg-warning" th:if="${o.status == 'SELLING'}">Đang bán</span>
                    <span class="badge bg-info" th:if="${o.status == 'PROCESSING'}">Chờ xác nhận</span>
                    <span class="badge bg-success" th:if="${o.status == 'COMPLETED'}">Hoàn thành</span>
                    <span class="badge bg-danger" th:if="${o.status == 'CANCELLED'}">Đã hủy</span>
                </div>

            </div>

            <hr>

            <!-- BODY -->
            <div class="row align-items-center">

                <div class="col-md-8">
                    <p class="mb-1">👤 Người bán:
                        <b th:text="${o.seller?.username}"></b>
                    </p>

                    <p class="mb-0">💰 Tổng tiền:
                        <span class="text-danger fw-bold"
                              th:text="${#numbers.formatDecimal(o.totalAmount,0,'COMMA',0,'POINT')}">
                    </span> đ
                    </p>
                </div>

                <div class="col-md-4 text-end">

                    <a th:href="@{'/market/detail/' + ${o.id}}"
                       class="btn btn-outline-dark btn-sm">
                        Chi tiết
                    </a>

                    <form th:if="${o.status == 'PROCESSING'}"
                          th:action="@{'/market/cancel/' + ${o.id}}"
                          method="post"
                          class="mt-2">

                        <button class="btn btn-danger btn-sm w-100">
                            Hủy đơn
                        </button>
                    </form>

                </div>

            </div>

        </div>
    </div>

    <!-- 📄 PAGINATION -->
    <nav class="mt-4" th:if="${totalPages > 1}">
        <ul class="pagination justify-content-center">

            <!-- PREV -->
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/market/my-buy(page=${currentPage - 1}, status=${currentStatus}, keyword=${keyword})}">
                    «
                </a>
            </li>

            <!-- PAGE -->
            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                th:classappend="${i == currentPage} ? 'active'">

                <a class="page-link"
                   th:text="${i + 1}"
                   th:href="@{/market/my-buy(page=${i}, status=${currentStatus}, keyword=${keyword})}">
                </a>
            </li>

            <!-- NEXT -->
            <li class="page-item"
                th:classappend="${currentPage == totalPages - 1} ? 'disabled'">

                <a class="page-link"
                   th:href="@{/market/my-buy(page=${currentPage + 1}, status=${currentStatus}, keyword=${keyword})}">
                    »
                </a>
            </li>

        </ul>
    </nav>
</div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
