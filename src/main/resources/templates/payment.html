<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thanh toán</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/style.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>

<body class="bg-light">

<div th:replace="~{layout/header :: header('Thanh toán')}"></div>

<div class="layout">
    <div th:replace="~{layout/sidebar :: sidebar}"></div>

    <div class="content">
        <div class="container text-center mt-5">

            <div class="card p-4 shadow-sm mx-auto" style="max-width:420px;">

                <h4 class="mb-3">Quét QR để thanh toán</h4>

                <!-- QR -->
                <img th:if="${qrUrl}"
                     th:src="${qrUrl}"
                     class="img-fluid mx-auto d-block"
                     style="max-width:260px;" />

                <div th:if="${qrUrl == null}" class="text-danger">
                    Không tạo được QR
                </div>

                <p class="mt-3">
                    Số tiền:
                    <b th:text="${amount}"></b> VND
                </p>

                <p>
                    Nội dung:
                    <b th:text="${content}"></b>
                </p>

                <p class="text-muted small">
                    Sau khi chuyển khoản, hệ thống sẽ tự động cộng tiền
                </p>

                <a href="/deposit" class="btn btn-outline-secondary mt-3">
                    ← Quay lại
                </a>

            </div>

        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
