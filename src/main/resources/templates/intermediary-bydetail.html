<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Invoice Detail - Buyer View</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/style.css}">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; }
        .card-invoice { max-width: 1000px; margin: 50px auto; background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 0 15px rgba(0,0,0,0.08); }
        table { width: 100%; }
        th { width: 25%; text-align: left; font-weight: 600; vertical-align: middle; }
        td { width: 75%; }
        .action-buttons { margin-top: 25px; text-align: center; }
        .img-thumb { width: 100px; height: 80px; object-fit: cover; border-radius: 5px; margin-right: 10px; }
        @media (max-width: 768px) {
            .img-thumb { width: 70px; height: 55px; }
        }
    </style>
</head>
<body class="bg-light">
<div th:replace="~{layout/header :: header('Invoice Detail')}"></div>
<div class="layout">
    <div th:replace="~{layout/sidebar :: sidebar}"></div>

    <div class="content">
        <div class="card-invoice">
            <h4 class="mb-4 fw-bold text-primary"><i class="bi bi-receipt"></i> Invoice Detail</h4>

            <!-- VIEW-ONLY TABLE -->
            <table class="table table-borderless">
                <tr><th>Invoice ID</th><td th:text="${invoice.invoiceId}"></td></tr>
                <tr><th>Code</th><td th:text="${invoice.invoiceCode}"></td></tr>
                <tr><th>Subject</th><td th:text="${invoice.subject}"></td></tr>
                <tr><th>Price</th><td th:text="${#numbers.formatDecimal(invoice.price,0,'COMMA',0,'POINT')} + ' đ'"></td></tr>
                <tr><th>Fee Amount</th><td th:text="${#numbers.formatDecimal(invoice.feeAmount,0,'COMMA',0,'POINT')} + ' đ'"></td></tr>
                <tr><th>Buyer Total</th><td th:text="${#numbers.formatDecimal(invoice.buyerTotal,0,'COMMA',0,'POINT')} + ' đ'"></td></tr>
                <tr><th>Description</th><td th:text="${invoice.description}"></td></tr>
                <tr><th>Contact</th><td th:text="${invoice.contactMethod}"></td></tr>
                <tr><th>Hidden Info</th><td th:text="${invoice.hiddenInfo}"></td></tr>
                <tr><th>Images</th>
                    <td>
                        <div class="d-flex flex-wrap gap-2">
                            <img th:each="img : ${invoice.images}" th:src="@{${img.imageUrl}}" class="img-thumb rounded border"/>
                        </div>
                    </td>
                </tr>
            </table>

            <!-- BUTTON SECTION -->
            <div class="action-buttons">
                <form th:action="@{/intermediary/confirm/{id}(id=${invoice.invoiceId})}" method="post">
                    <button type="submit" class="btn btn-primary btn-lg">Confirm</button>
                </form>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
