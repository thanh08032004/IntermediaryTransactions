<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security6">

<head>
    <meta charset="UTF-8">
    <title>Intermediary Invoice</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/style.css}">
</head>

<body class="bg-light">

<!-- HEADER -->
<div th:replace="~{layout/header :: header('Product Management')}"></div>

<!-- LAYOUT -->
<div class="layout">

    <!-- SIDEBAR -->
    <div th:replace="~{layout/sidebar :: sidebar}"></div>

    <!-- CONTENT -->
    <div class="content">
        <div class="container-fluid mt-4 px-4">

            <div class="card shadow">

                <!-- HEADER -->
                <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                    <h4 class="mb-0">Product Management</h4>

                    <a th:href="@{/intermediary/create}" class="btn btn-success btn-sm">
                        <i class="bi bi-plus-circle"></i> Create Intermediary
                    </a>
                </div>

                <!-- BODY -->
                <div class="card-body">

                    <!-- ALERT -->
                    <div th:if="${param.success == 'added'}" class="alert alert-success">
                        Product added successfully
                    </div>

                    <div th:if="${param.success == 'updated'}" class="alert alert-info">
                        Product updated successfully
                    </div>

                    <div th:if="${param.success == 'deleted'}" class="alert alert-warning">
                        Product deleted
                    </div>

                    <!-- SEARCH -->
                    <form method="get" th:action="@{/intermediary/list}" class="row mb-3">
                        <div class="col-md-4">
                            <input type="text"
                                   name="keyword"
                                   th:value="${keyword}"
                                   class="form-control"
                                   placeholder="Search invoice code or subject...">
                        </div>

                        <div class="col-md-2">
                            <button class="btn btn-primary">
                                <i class="bi bi-search"></i> Search
                            </button>
                        </div>
                    </form>

                    <!-- TABLE -->
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-secondary">
                            <tr>
                                <th>Image</th>
                                <th>Invoice ID</th>
                                <th>Code</th>
                                <th>Subject</th>
                                <th>Price</th>
                                <th>Status</th>
                                <th>Contact</th>
                                <th>Action</th>
                            </tr>
                            </thead>

                            <tbody>
                            <tr th:each="inv : ${invoices}">
                                <td>
                                    <img th:src="${inv.mainImageUrl}" alt="Invoice Image"
                                         class="img-thumbnail" style="width:80px;height:60px;object-fit:cover;" />
                                </td>
                                <td th:text="${inv.invoiceId}"></td>
                                <td th:text="${inv.invoiceCode}"></td>
                                <td th:text="${inv.subject}"></td>
                                <td th:text="${#numbers.formatDecimal(inv.price,0,'COMMA',0,'POINT')} + ' đ'"></td>
                                <td>
                    <span th:switch="${inv.status}">
                        <span th:case="'SUCCESS'" class="badge bg-success" th:text="${inv.status}"></span>
                        <span th:case="'PENDING'" class="badge bg-warning text-dark" th:text="${inv.status}"></span>
                        <span th:case="'CHECKING'" class="badge bg-info text-dark" th:text="${inv.status}"></span>
                        <span th:case="'COMPLAINT'" class="badge bg-danger" th:text="${inv.status}"></span>
                        <span th:case="*" class="badge bg-secondary" th:text="${inv.status}"></span>
                    </span>
                                </td>
                                <td th:text="${inv.contactMethod}"></td>
                                <td>
                                    <a th:href="@{'/intermediary/bydetail/' + ${inv.invoiceId}}"
                                       class="btn btn-primary btn-sm">
                                        <i class="bi bi-eye"></i> View
                                    </a>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>

                    <!-- PAGINATION -->
                    <nav aria-label="Invoice pagination">
                        <ul class="pagination justify-content-center flex-wrap">
                            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                                <a class="page-link"
                                   th:href="@{/intermediary/list(page=${currentPage - 1},keyword=${keyword})}">Previous</a>
                            </li>

                            <li class="page-item"
                                th:each="i : ${#numbers.sequence(0,totalPages - 1)}"
                                th:classappend="${i == currentPage} ? 'active'">
                                <a class="page-link"
                                   th:text="${i+1}"
                                   th:href="@{/intermediary/list(page=${i},size=${size},keyword=${keyword})}"></a>
                            </li>

                            <li class="page-item" th:classappend="${currentPage+1 == totalPages} ? 'disabled'">
                                <a class="page-link"
                                   th:href="@{/intermediary/list(page=${currentPage+1},keyword=${keyword})}">Next</a>
                            </li>
                        </ul>
                    </nav>

                    <style>
                        /* Fix nổ style pagination */
                        .pagination {
                            margin: 0;
                            padding: 0;
                            flex-wrap: wrap; /* wrap khi màn hình nhỏ */
                        }
                        .page-item.disabled .page-link {
                            pointer-events: none;
                            opacity: 0.5;
                        }
                        .page-item.active .page-link {
                            background-color: #0d6efd;
                            border-color: #0d6efd;
                            color: #fff;
                        }
                        .table td img {
                            max-width: 80px;
                            max-height: 60px;
                            object-fit: cover;
                            border-radius: 4px;
                        }
                        @media (max-width: 768px) {
                            .table td img {
                                max-width: 60px;
                                max-height: 45px;
                            }
                            .page-link {
                                padding: 0.3rem 0.5rem;
                                font-size: 0.85rem;
                            }
                        }
                    </style>

                </div>
            </div>

        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
