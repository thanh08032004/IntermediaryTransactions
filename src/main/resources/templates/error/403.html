<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Access Denied</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">
<div class="container text-center">
    <h1 class="display-1 fw-bold text-danger">403</h1>
    <h2 class="mb-4">Access Denied</h2>
    <p class="lead">Sorry, you do not have permission to perform this action or access this page.</p>
    <div class="mt-4">
        <a href="/" class="btn btn-primary px-4">Back to Home page</a>
        <button onclick="history.back()" class="btn btn-outline-secondary px-4">Back to Previous Page</button>
    </div>
</div>
</body>
</html>
