<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>404 - Page Not Found</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">
<div class="container vh-100 d-flex flex-column justify-content-center align-items-center">
    <div class="text-center">
        <i class="bi bi-exclamation-triangle-fill text-warning" style="font-size: 6rem;"></i>
        <h1 class="display-1 fw-bold text-dark">404</h1>
        <h2 class="mb-3">Oops! Page not found</h2>
        <p class="text-muted mb-4">TThe page you are looking for may have been deleted, renamed, or temporarily unavailable.</p>
        <div class="d-flex gap-2 justify-content-center">
            <a href="/" class="btn btn-primary px-4"><i class="bi bi-house-door me-2"></i>Back to Home Page</a>
            <button onclick="history.back()" class="btn btn-outline-secondary px-4">Back to Previous Page</button>
        </div>
    </div>
</div>
</body>
</html>
