<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Chợ trung gian</title>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icon -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/style.css}">

    <style>
        body {
            background: #f5f5f5;
            font-family: 'Inter', sans-serif;
        }

        .card {
            border-radius: 12px;
            transition: 0.2s;
        }

        .card:hover {
            transform: translateY(-3px);
        }

        .btn-danger {
            background-color: #ee4d2d;
            border: none;
        }

        .btn-danger:hover {
            background-color: #d8432a;
        }
    </style>
</head>
<div th:replace="layout/header :: header('Chợ trung gian')"></div>
<div th:replace="~{layout/sidebar :: sidebar}"></div>
<body>



<div class="container mt-4">

    <!-- 🔍 FILTER GIÁ -->
    <form method="get" th:action="@{/market}">
        <div class="d-flex align-items-center gap-2 mb-3">

            <input type="number"
                   name="minPrice"
                   class="form-control"
                   placeholder="Giá từ"
                   th:value="${minPrice}">

            <input type="number"
                   name="maxPrice"
                   class="form-control"
                   placeholder="Đến"
                   th:value="${maxPrice}">

            <button class="btn btn-danger">Lọc</button>

        </div>
    </form>

    <!-- LIST -->
    <div class="row g-3">

        <div class="col-12" th:each="o : ${orders}">

            <div class="card border-0 shadow-sm p-3">

                <div class="d-flex justify-content-between align-items-center">

                    <!-- LEFT -->
                    <div>

                        <div class="fw-bold">
                            🧾 <span th:text="${o.orderCode}"></span>
                        </div>

                        <div class="text-muted small">
                            <i class="bi bi-person"></i>
                            <span th:text="${o.seller != null ? o.seller.username : 'N/A'}"></span>
                        </div>

                        <div class="mt-1">
                            <span class="badge bg-light text-dark border"
                                  th:text="${o.category != null ? o.category.name : 'N/A'}"></span>

                            <span class="text-muted small ms-2"
                                  th:text="${o.category != null ? o.category.description : ''}"></span>
                        </div>

                    </div>

                    <!-- RIGHT -->
                    <div class="text-end">

                        <!-- STATUS -->
                        <div class="mb-1">
                            <span class="badge bg-warning text-dark"
                                  th:if="${o.status == 'PENDING'}">Đang bán</span>

                            <span class="badge bg-info"
                                  th:if="${o.status == 'PROCESSING'}">Đang xử lý</span>

                            <span class="badge bg-success"
                                  th:if="${o.status == 'COMPLETED'}">Hoàn thành</span>
                        </div>

                        <!-- PRICE -->
                        <div class="fw-bold text-danger fs-5"
                             th:text="${#numbers.formatDecimal(o.totalAmount,0,'COMMA',0,'POINT')} + ' đ'">
                        </div>

                        <!-- DATE -->
                        <div class="text-muted small"
                             th:text="${#dates.format(o.createdAt, 'dd/MM/yyyy HH:mm')}">
                        </div>

                        <!-- BUTTON -->
                        <div class="mt-2 d-flex justify-content-end gap-2">

                            <a th:href="@{'/market/detail/' + ${o.id}}"
                               class="btn btn-outline-secondary btn-sm">
                                Chi tiết
                            </a>

                            <form th:if="${o.status == 'PENDING'}"
                                  th:action="@{'/market/buy/' + ${o.id}}"
                                  method="post">

                                <button class="btn btn-danger btn-sm">
                                    Mua ngay
                                </button>
                            </form>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- 📄 PAGINATION -->
    <nav class="mt-4" th:if="${totalPages > 1}">
        <ul class="pagination justify-content-center">

            <!-- PREV -->
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/market(page=${currentPage - 1}, minPrice=${minPrice}, maxPrice=${maxPrice})}">
                    «
                </a>
            </li>

            <!-- PAGE -->
            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                th:classappend="${i == currentPage} ? 'active'">

                <a class="page-link"
                   th:text="${i + 1}"
                   th:href="@{/market(page=${i}, minPrice=${minPrice}, maxPrice=${maxPrice})}">
                </a>
            </li>

            <!-- NEXT -->
            <li class="page-item"
                th:classappend="${currentPage == totalPages - 1} ? 'disabled'">

                <a class="page-link"
                   th:href="@{/market(page=${currentPage + 1}, minPrice=${minPrice}, maxPrice=${maxPrice})}">
                    »
                </a>
            </li>

        </ul>
    </nav>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
