<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Chợ trung gian</title>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icon -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/style.css}">

    <style>
        body {
            background: #f5f5f5;
            font-family: 'Inter', sans-serif;
        }

        .table img {
            width: 80px;
            height: 60px;
            object-fit: cover;
            border-radius: 6px;
        }

        .table-hover tbody tr:hover {
            background-color: #fafafa;
        }

        .btn-danger {
            background-color: #ee4d2d;
            border: none;
        }

        .btn-danger:hover {
            background-color: #d8432a;
        }
    </style>
</head>

<body class="bg-light">

<!-- HEADER -->
<div th:replace="~{layout/header :: header('Chợ trung gian')}"></div>

<div class="layout">

    <!-- SIDEBAR -->
    <div th:replace="~{layout/sidebar :: sidebar}"></div>

    <!-- CONTENT -->
    <div class="content">

        <div class="container mt-4">

            <!-- FILTER -->
            <div class="card shadow-sm border-0 mb-4">
                <div class="card-body">

                    <form method="get" th:action="@{/market}">
                        <div class="row g-2 align-items-end">

                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Giá từ</label>
                                <input type="number" name="minPrice"
                                       class="form-control"
                                       th:value="${minPrice}">
                            </div>

                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Đến</label>
                                <input type="number" name="maxPrice"
                                       class="form-control"
                                       th:value="${maxPrice}">
                            </div>

                            <div class="col-md-4 d-grid">
                                <button class="btn btn-danger">
                                    <i class="bi bi-search"></i> Lọc sản phẩm
                                </button>
                            </div>

                        </div>
                    </form>

                </div>
            </div>

            <!-- TABLE -->
            <div class="card shadow border-0">
                <div class="card-header bg-danger text-white">
                    <h5 class="mb-0">Danh sách sản phẩm</h5>
                </div>

                <div class="card-body p-0">
                    <table class="table table-hover align-middle mb-0">

                        <thead class="table-light">
                        <tr>
                            <th>Hình</th>
                            <th>Tên</th>
                            <th>Danh mục</th>
                            <th>Giá</th>
                            <th class="text-end">Hành động</th>
                        </tr>
                        </thead>

                        <tbody>
                        <tr th:each="p : ${products}">

                            <td>
                                <img th:src="@{${p.mainImageUrl}}" style="width:60px;border-radius:8px;">
                            </td>

                            <td class="fw-semibold" th:text="${p.name}"></td>

                            <td>
                    <span class="badge bg-light text-dark border"
                          th:text="${p.category?.name}">
                    </span>
                            </td>

                            <td class="text-danger fw-bold"
                                th:text="${#numbers.formatDecimal(p.price,0,'COMMA',0,'POINT')} + ' đ'">
                            </td>

                            <td class="text-end">
                                <div class="d-flex justify-content-end gap-2">

                                    <a th:href="@{'/market/product/' + ${p.id}}"
                                       class="btn btn-sm btn-outline-secondary">
                                        Chi tiết
                                    </a>

                                    <form th:action="@{'/cart/add/' + ${p.id}}" method="post">
                                        <button class="btn btn-sm btn-danger">
                                            <i class="bi bi-cart-plus"></i>
                                        </button>
                                    </form>

                                </div>
                            </td>

                        </tr>
                        </tbody>

                    </table>
                </div>
            </div>

            <!-- PAGINATION -->
            <nav class="mt-4" th:if="${totalPages > 1}">
                <ul class="pagination justify-content-center">

                    <!-- PREV -->
                    <li class="page-item"
                        th:classappend="${currentPage == 0} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/market(page=${currentPage - 1}, minPrice=${minPrice}, maxPrice=${maxPrice})}">
                            «
                        </a>
                    </li>

                    <!-- PAGE -->
                    <li class="page-item"
                        th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                        th:classappend="${i == currentPage} ? 'active'">

                        <a class="page-link"
                           th:text="${i + 1}"
                           th:href="@{/market(page=${i}, minPrice=${minPrice}, maxPrice=${maxPrice})}">
                        </a>
                    </li>

                    <!-- NEXT -->
                    <li class="page-item"
                        th:classappend="${currentPage == totalPages - 1} ? 'disabled'">

                        <a class="page-link"
                           th:href="@{/market(page=${currentPage + 1}, minPrice=${minPrice}, maxPrice=${maxPrice})}">
                            »
                        </a>
                    </li>

                </ul>
            </nav>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
