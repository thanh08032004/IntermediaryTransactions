<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security6">
<head>
    <meta charset="UTF-8">
    <title>Checkout</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/style.css}">
</head>

<body class="bg-light">

<!-- HEADER -->
<div th:replace="~{layout/header :: header('Checkout')}"></div>

<!-- LAYOUT -->
<div class="layout">

    <!-- SIDEBAR -->
    <div th:replace="~{layout/sidebar :: sidebar}"></div>

    <!-- CONTENT -->
    <div class="content">
        <div class="container py-4">

            <div class="row g-4">

                <!-- LEFT: SHIPPING + BUTTON -->
                <div class="col-lg-4">

                    <div class="card shadow-sm border-0 rounded-3">
                        <div class="card-body">

                            <h5 class="fw-bold mb-3">
                                <i class="bi bi-truck"></i> Order Action
                            </h5>

                            <p class="text-muted small">
                                Please review your order before confirming.
                            </p>

                            <form th:action="@{/checkout}" method="post">

                                <div class="d-grid mt-4">
                                    <button class="btn btn-success btn-lg rounded-3">
                                        <i class="bi bi-bag-check"></i> Confirm Order
                                    </button>
                                </div>

                            </form>

                        </div>
                    </div>

                </div>

                <!-- RIGHT: ORDER -->
                <div class="col-lg-8">

                    <div class="card shadow-sm border-0 rounded-3">

                        <div class="card-header bg-white border-bottom">
                            <h5 class="mb-0 fw-bold">
                                <i class="bi bi-cart"></i> Your Order
                            </h5>
                        </div>

                        <div class="card-body">

                            <!-- EMPTY -->
                            <div th:if="${#lists.isEmpty(cart.items)}"
                                 class="text-center py-5">
                                <i class="bi bi-cart-x fs-1 text-muted"></i>
                                <p class="mt-3 text-muted">Your cart is empty</p>
                                <a href="/products" class="btn btn-outline-primary btn-sm">
                                    Continue Shopping
                                </a>
                            </div>

                            <!-- HAS ITEMS -->
                            <div th:if="${!#lists.isEmpty(cart.items)}">

                                <div class="table-responsive">
                                    <table class="table align-middle">
                                        <thead class="table-light">
                                        <tr>
                                            <th>Product</th>
                                            <th class="text-center">Qty</th>
                                            <th class="text-end">Price</th>
                                            <th class="text-end">Subtotal</th>
                                        </tr>
                                        </thead>

                                        <tbody>
                                        <tr th:each="item : ${cart.items}">
                                            <td>
                                                <div class="d-flex align-items-center gap-3">
                                                    <img th:src="${item.product.mainImageUrl}"
                                                         style="width:60px;height:60px;object-fit:cover;border-radius:8px;">
                                                    <div>
                                                        <div class="fw-semibold"
                                                             th:text="${item.product.name}"></div>
                                                    </div>
                                                </div>
                                            </td>

                                            <td class="text-center"
                                                th:text="${item.quantity}"></td>

                                            <td class="text-end"
                                                th:text="${#numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>

                                            <td class="text-end fw-semibold text-success"
                                                th:text="${#numbers.formatDecimal(item.price.multiply(item.quantity), 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                                        </tr>
                                        </tbody>
                                    </table>
                                </div>

                                <!-- TOTAL BOX -->
                                <div class="d-flex justify-content-end mt-4">
                                    <div class="p-3 bg-light rounded-3" style="min-width:250px;">
                                        <div class="d-flex justify-content-between mb-2">
                                            <span>Total</span>
                                            <strong class="text-success"
                                                    th:text="${#numbers.formatDecimal(total, 0, 'COMMA', 0, 'POINT')} + ' đ'">
                                            </strong>
                                        </div>
                                    </div>
                                </div>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
