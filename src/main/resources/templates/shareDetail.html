<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Invoice Detail</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Icon -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" th:href="@{/style.css}">

  <style>
    /* ====== IMAGE THUMBNAIL ====== */
    .img-thumb {
      width: 120px;
      height: 90px;
      object-fit: cover;
      border: 1px solid #dee2e6;
      border-radius: 5px;
      transition: transform 0.2s;
    }
    .img-thumb:hover {
      transform: scale(1.1);
      z-index: 1;
    }

    /* ====== TABLE STYLING ====== */
    .table td {
      vertical-align: middle;
      word-break: break-word;
    }

    /* ====== RESPONSIVE ====== */
    .container {
      max-width: 100%;
    }
    @media (max-width: 768px) {
      .img-thumb {
        width: 90px;
        height: 70px;
      }
      .card-body {
        padding: 1rem;
      }
    }

    /* ====== SHARE LINK INPUT ====== */
    .share-link input {
      cursor: pointer;
    }
  </style>
</head>

<body class="bg-light">

<!-- HEADER -->
<div th:replace="~{layout/header :: header('Invoice Detail')}"></div>

<div class="layout d-flex">

  <!-- SIDEBAR -->
  <div th:replace="~{layout/sidebar :: sidebar}"></div>

  <!-- MAIN CONTENT -->
  <div class="content flex-grow-1 p-4">

    <div class="container mt-5" style="max-width: 1000px">
      <div class="card shadow-sm border-0">
        <div class="card-body p-4">

          <h4 class="mb-4 fw-bold text-primary">
            <i class="bi bi-receipt"></i> Invoice Detail
          </h4>

          <table class="table table-borderless">
            <tr>
              <th>Invoice ID</th>
              <td th:text="${invoice.invoiceId}"></td>
            </tr>
            <tr>
              <th>Code</th>
              <td th:text="${invoice.invoiceCode}"></td>
            </tr>
            <tr>
              <th>Subject</th>
              <td th:text="${invoice.subject}"></td>
            </tr>
            <tr>
              <th>Price</th>
              <td th:text="${#numbers.formatDecimal(invoice.price,0,'COMMA',0,'POINT')}"></td>
            </tr>
            <tr>
              <th>Fee Amount</th>
              <td th:text="${#numbers.formatDecimal(invoice.feeAmount,0,'COMMA',0,'POINT')}"></td>
            </tr>
            <tr>
              <th>Buyer Total</th>
              <td th:text="${#numbers.formatDecimal(invoice.buyerTotal,0,'COMMA',0,'POINT')}"></td>
            </tr>
            <tr>
              <th>Description</th>
              <td th:text="${invoice.description}"></td>
            </tr>
            <tr>
              <th>Images</th>
              <td>
                <div class="d-flex flex-wrap gap-2">
                  <img th:each="img : ${invoice.images}" th:src="@{${img.imageUrl}}"
                       class="img-thumb rounded border"/>
                </div>
              </td>
            </tr>
          </table>

          <!-- SHARE LINK -->
          <div class="mb-3 share-link"
               th:if="${currentUser != null and invoice.sellerId == currentUser.id}">
            <label class="form-label fw-bold">Share Link:</label>
            <input type="text" class="form-control"
                   th:value="'http://localhost:8080/intermediary/join/' + ${invoice.shareToken}"
                   readonly
                   onclick="this.select(); document.execCommand('copy');"/>
            <small class="text-muted">Click để copy link gửi khách hàng thanh toán</small>
          </div>

          <!-- ACCEPT & PAY BUTTON -->
          <div class="text-center mt-3"
               th:if="${invoice.status.name() == 'PENDING' and isCustomer}">
            <form th:action="@{/intermediary/pay/{id}(id=${invoice.invoiceId})}" method="post">
              <button type="submit" class="btn btn-success px-5">
                <i class="bi bi-check-circle"></i> Accept & Pay
              </button>
            </form>
          </div>

        </div>
      </div>
    </div>

  </div>
</div>

</body>
</html>
