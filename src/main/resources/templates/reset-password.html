<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reset Password - HSF System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); height: 100vh; display: flex; align-items: center; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; }
        .login-card { border: none; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); background: #ffffff; }
        .login-header { padding: 35px 40px 10px; text-align: center; }
        .login-header i { font-size: 3rem; color: #764ba2; }
        .card-body { padding: 20px 50px 35px !important; }
        .form-control { border-radius: 12px; padding: 12px 18px; border: 1px solid #e0e0e0; }
        .btn-login { background: linear-gradient(to right, #667eea, #764ba2); border: none; border-radius: 12px; padding: 14px; font-weight: 700; color: white; transition: all 0.3s ease; }
        .btn-login:hover { filter: brightness(1.1); transform: translateY(-2px); }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-11 col-sm-10 col-md-8 col-lg-5 col-xl-4">
            <div class="login-card card shadow">
                <div class="login-header">
                    <i class="bi bi-shield-lock-fill"></i>
                    <h3 class="fw-bold mt-2">New Password</h3>
                    <p class="text-muted small">Đặt mật khẩu mới cho tài khoản của bạn</p>
                </div>
                <div class="card-body">
                    <form th:action="@{/reset-password}" method="post">
                        <input type="hidden" name="token" th:value="${token}">
                        <div class="mb-3 text-start">
                            <label class="form-label small fw-bold">Mật khẩu mới</label>
                            <input type="password" name="password" id="password" class="form-control" placeholder="Tối thiểu 6 ký tự" required autofocus>
                        </div>
                        <div class="mb-4 text-start">
                            <label class="form-label small fw-bold">Xác nhận mật khẩu</label>
                            <input type="password" id="confirmPassword" class="form-control" placeholder="Nhập lại mật khẩu" required>
                            <div id="msg" class="small mt-1"></div>
                        </div>
                        <button type="submit" id="submitBtn" class="btn btn-login w-100 mb-2">UPDATE PASSWORD</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
    const password = document.getElementById('password');
    const confirm = document.getElementById('confirmPassword');
    const msg = document.getElementById('msg');
    const btn = document.getElementById('submitBtn');
    confirm.addEventListener('input', () => {
        if (password.value === confirm.value) {
            msg.textContent = 'Mật khẩu khớp!'; msg.className = 'small mt-1 text-success'; btn.disabled = false;
        } else {
            msg.textContent = 'Mật khẩu chưa khớp.'; msg.className = 'small mt-1 text-danger'; btn.disabled = true;
        }
    });
</script>
</body>
</html>
