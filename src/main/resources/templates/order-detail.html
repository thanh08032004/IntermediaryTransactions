<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Order details</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/style.css}">
</head>

<body class="bg-light">

<div th:replace="~{layout/header :: header('Order Detail')}"></div>

<div class="layout">
  <div th:replace="~{layout/sidebar :: sidebar}"></div>

  <div class="content">
    <div class="container mt-4">

      <h3 class="mb-3">📦 Order details</h3>

      <div class="card shadow border-0">
        <div class="card-body">

          <!-- HEADER -->
          <div class="d-flex justify-content-between">
            <div>
              <h5 class="fw-bold" th:text="${order.orderCode}"></h5>
              <small class="text-muted"
                     th:text="${#dates.format(order.createdAt,'dd/MM/yyyy HH:mm')}">
              </small>
            </div>

            <div>
              <span class="badge bg-warning" th:if="${order.status == 'SELLING'}">Currently for sale</span>
              <span class="badge bg-info" th:if="${order.status == 'PROCESSING'}">Awaiting confirmation</span>
              <span class="badge bg-success" th:if="${order.status == 'COMPLETED'}">Complete</span>
              <span class="badge bg-danger" th:if="${order.status == 'CANCELLED'}">Cancelled</span>
            </div>
          </div>

          <hr>

          <!-- INFO -->
          <div class="row">
            <div class="col-md-6">
              <p>👤 Buyer:
                <b th:text="${order.buyer?.username}"></b>
              </p>

              <p>🛒 Seller:
                <b th:text="${order.seller?.username}"></b>
              </p>
            </div>

            <div class="col-md-6 text-end">
              <p>💰 Total Amount:</p>
              <h4 class="text-danger fw-bold"
                  th:text="${#numbers.formatDecimal(order.totalAmount,0,'COMMA',0,'POINT')} + ' đ'">
              </h4>
            </div>
          </div>

          <hr>

          <!-- ORDER ITEMS -->
          <h5 class="mb-3">📋 Product list</h5>

          <table class="table table-bordered">
            <thead class="table-light">
            <tr>
              <th>#</th>
              <th>Product</th>
              <th>Price</th>
              <th>Quantity</th>
              <th>Total amount</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item, i : ${order.orderItems}">
              <td th:text="${i.index + 1}"></td>
              <td th:text="${item.product.name}"></td>
              <td th:text="${#numbers.formatDecimal(item.price,0,'COMMA',0,'POINT')}"></td>
              <td th:text="${item.quantity}"></td>
              <td th:text="${#numbers.formatDecimal(item.price * item.quantity,0,'COMMA',0,'POINT')}"></td>
            </tr>
            </tbody>
          </table>

          <!-- ACTION -->
          <!-- ACTION -->
          <div class="text-end mt-3">

            <a th:href="@{/payment/{id}(id=${order.id})}"
               class="btn btn-success">
              💳 Thanh toán
            </a>

            <!-- Back -->
            <a href="/market/my-buy" class="btn btn-secondary">
              ← Back
            </a>

          </div>

        </div>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
