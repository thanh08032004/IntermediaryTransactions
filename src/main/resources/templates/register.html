<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register - HSF System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow border-0">
                <div class="card-body p-5">
                    <h2 class="text-center mb-4">Create Account</h2>

                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                    <form th:action="@{/register}" th:object="${user}" method="post" id="registerForm">
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" th:field="*{username}" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" th:field="*{password}" id="password" class="form-control" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Confirm Password</label>
                            <input type="password" name="confirmPassword" id="confirmPassword" class="form-control" required>
                            <div id="passwordError" class="text-danger small mt-1" style="display:none;">
                                Passwords do not match!
                            </div>
                        </div>

                        <button type="submit" id="submitBtn" class="btn btn-primary w-100 py-2">Register Now</button>
                    </form>

                    <script>
                        const password = document.getElementById("password");
                        const confirmPassword = document.getElementById("confirmPassword");
                        const errorMsg = document.getElementById("passwordError");
                        const submitBtn = document.getElementById("submitBtn");

                        function validatePassword() {
                            if (password.value !== confirmPassword.value) {
                                confirmPassword.classList.add("is-invalid");
                                errorMsg.style.display = "block";
                                submitBtn.disabled = true;
                            } else {
                                confirmPassword.classList.remove("is-invalid");
                                confirmPassword.classList.add("is-valid");
                                errorMsg.style.display = "none";
                                submitBtn.disabled = false;
                            }
                        }

                        confirmPassword.addEventListener("keyup", validatePassword);
                        password.addEventListener("keyup", validatePassword);
                    </script>

                    <div class="text-center mt-3">
                        <p>Already have an account? <a href="/login">Login here</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
