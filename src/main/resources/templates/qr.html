<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Thanh toán</title>
</head>
<body>

<h2>Quét QR để thanh toán</h2>

<p>Số tiền: <span th:text="${amount}"></span> VND</p>
<p>Nội dung: <span th:text="${content}"></span></p>

<img th:src="${qrUrl}" alt="QR Code">

<p>Vui lòng chuyển khoản đúng nội dung để hệ thống tự xác nhận.</p>

</body>
</html>
